<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа Моти • 90-е аниме RPG</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a2b3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            background: #0a1a2a;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 0 #04121e, 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #7f8c9a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 900px;
            height: 500px;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #7f8c9a, 0 0 0 3px #2c3e50;
            background: #3a4e62;  /* цвет фона для неба/стены */
            image-rendering: pixelated;
        }
        .control-panel {
            margin-top: 16px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            background: #2e4155;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #0f1c2a;
            box-shadow: inset 0 -2px 0 #0f1c2a;
        }
        .dpad {
            display: flex;
            gap: 6px;
        }
        .dpad button {
            background: #4a617c;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            box-shadow: 0 5px 0 #1e2f3f, 0 6px 10px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 2px solid #8098b0;
        }
        .dpad button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #1e2f3f;
        }
        .action-btn {
            background: #f0c45a;
            border: none;
            font-size: 24px;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            box-shadow: 0 5px 0 #b87e2a, 0 6px 10px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 2px solid #ffe29c;
            color: #252017;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b87e2a;
        }
        .status {
            background: #1f313f;
            padding: 10px 24px;
            border-radius: 40px;
            color: #b3dbff;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #4b6e88;
            box-shadow: inset 0 -2px 0 #0f1f2c;
        }
        .dialog-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 750px;
            background: #0e1c28;
            border: 4px solid #b1c9e8;
            border-radius: 24px;
            padding: 20px 30px;
            box-shadow: 0 10px 0 #030b12, 0 15px 30px black;
            color: #e9f2ff;
            font-size: 22px;
            font-family: 'Courier New', monospace;
            display: none;
            z-index: 10;
        }
        .speaker-name {
            color: #ffd966;
            font-size: 18px;
            margin-bottom: 5px;
            border-bottom: 2px solid #4a6990;
            display: inline-block;
            padding-right: 20px;
        }
        .dialog-text {
            min-height: 70px;
            margin: 15px 0;
            line-height: 1.4;
        }
        .dialog-options {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
        }
        .dialog-options button {
            background: #3a506b;
            border: 3px solid #7d9ec0;
            color: white;
            font-size: 22px;
            padding: 8px 25px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 5px 0 #1f2f3f;
            cursor: pointer;
        }
        .dialog-options button:active {
            transform: translateY(5px);
            box-shadow: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <!-- Диалоговое окно -->
    <div id="dialogOverlay" class="dialog-box">
        <div id="speakerName" class="speaker-name">Персонаж</div>
        <div id="dialogText" class="dialog-text">Текст диалога</div>
        <div class="dialog-options">
            <button id="choice1">Вариант 1</button>
            <button id="choice2">Вариант 2</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="dpad">
            <button id="btnLeft">←</button>
            <button id="btnRight">→</button>
        </div>
        <div class="status" id="statusText">3 этаж • коридор</div>
        <button class="action-btn" id="actionBtn">💬 говорить</button>
    </div>
</div>

<script>
(function() {
    // -------------------------------------------------
    // ТВОИ ТЕКСТУРЫ
    // -------------------------------------------------
    const TEXTURES = {
        hero: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAP0lEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwPj4+fO7cOQMdA7VdwEDtF8DwgQbVq1evRkZGBl9fXwb6Gc5AawAAy38dDy8zrI8AAAAASUVORK5CYII=',
        teacher: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAQ0lEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwbty48eHh4YyMjAw4DaeGAdQFDQ0NUVFRUQwMDLdv34ZRBgYGdDdQUfUAANIoI70IGz9CAAAAAElFTkSuQmCC',
        classmate: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAARklEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwNDQ0PD09fUZGBm6DqWl4Q0NDVFhY2IyGhgY8BjPQ3gVUNAMAoqWlBRgYGBiobgYA2pQfPx2KbsoAAAAASUVORK5CYII=',
        friend: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAASklEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQzAwsLC4O3tPaOhoQGn4dQwgLqA0d7e/mR1dTUDIwMDLsOp4YLqAgYGBgYqRgEAkkAfP2+Q+1QAAAAASUVORK5CYII=',
        door: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAARUlEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwf/78Y8eOHWNgYGDAbTg1DKAuYGRkZJw9e/YMBgYGXIbDnNnQ0BAVFRXFwMBAzSgAAKB5Hz8NxUMrAAAAAElFTkSuQmCC',
        stairs: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAARUlEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwf/78Y8eOHWNgYGDAbTg1DKAuYGRkZJw9e/YMBgYGXIYzMjLOqKioYGBgYKBiFADX+R8/ikBgdQAAAABJRU5ErkJggg==',
        window: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAARklEQVRIS2NkoDFgpLH5/0Mtm4G6ABeGjQwwf/78Y8eOHWNgYGDAbTg1DKAuYGRkZJw9e/YMBgYGXIYzMjKeDA0NZaC6GQBE5R8/7I9eXgAAAABJRU5ErkJggg=='
    };

    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let motyaX = 8;
    const WORLD_WIDTH = 22;  // больше клеток для широкого экрана
    const CELL_SIZE = 40;

    let dialogActive = false;
    let currentNPC = null;
    let nearbyNPC = null;

    // ---------- ПЕРСОНАЖИ ----------
    const npcs = [
        { 
            id: 'teacher1', 
            name: 'учитель', 
            type: 'teacher', 
            x: 4,
            dialog: {
                text: 'Мотя, когда будешь уроки делать?',
                options: ['Сегодня', 'Завтра'],
                responses: ['Ну смотри, не затягивай.', 'Лентяй...']
            }
        },
        { 
            id: 'classmate1', 
            name: 'одноклассница', 
            type: 'classmate', 
            x: 9,
            dialog: {
                text: 'Привет! Как каникулы прошли?',
                options: ['Отлично!', 'Так себе'],
                responses: ['Круто, я тоже отдохнула!', 'Бывает... в школе увидимся']
            }
        },
        { 
            id: 'friend1', 
            name: 'друг Юки', 
            type: 'friend', 
            x: 14,
            dialog: {
                text: 'Мотя! В новую игру рубились?',
                options: ['Ага', 'Не, не было времени'],
                responses: ['Я тебе дам поиграть!', 'Жалко, крутая игра']
            }
        },
        { 
            id: 'teacher2', 
            name: 'завуч', 
            type: 'teacher', 
            x: 18,
            dialog: {
                text: 'Опять по коридору бегаешь?',
                options: ['Я не бегал', 'Извините'],
                responses: ['Смотри мне...', 'Так-то лучше']
            }
        }
    ];

    // ---------- ОБЪЕКТЫ ----------
    const objects = [
        { type: 'door', x: 2, name: 'кабинет 210' },
        { type: 'door', x: 6, name: 'кабинет 211' },
        { type: 'stairs', x: 11, name: 'лестница' },
        { type: 'window', x: 16, name: 'окно' },
        { type: 'door', x: 20, name: 'кабинет 212' }
    ];

    // ---------- ОТРИСОВКА (НАСТОЯЩИЙ ВИД СБОКУ) ----------
    function drawSprite(type, dx, dy) {
        let img = new Image();
        img.src = TEXTURES[type] || TEXTURES.wall;
        ctx.drawImage(img, dx, dy, CELL_SIZE, CELL_SIZE);
    }

    function renderGame() {
        ctx.clearRect(0, 0, 900, 500);

        // --- ФОН (ДАЛЬНЯЯ СТЕНА) ---
        ctx.fillStyle = '#4f6f8f';  // цвет дальней стены
        ctx.fillRect(0, 0, 900, 220);

        // --- ЛИНИЯ ГОРИЗОНТА (стык стены и пола) ---
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0, 210, 900, 10);

        // --- ПОЛ (СВЕТЛЫЙ ДЕРЕВЯННЫЙ) ---
        ctx.fillStyle = '#b8a27b';  // светлый деревянный пол
        ctx.fillRect(0, 220, 900, 280);
        
        // Текстура пола (доски)
        ctx.strokeStyle = '#9b8460';
        ctx.lineWidth = 2;
        for (let i = 0; i < 15; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 240 + i * 18);
            ctx.lineTo(900, 240 + i * 18);
            ctx.strokeStyle = '#9b8460';
            ctx.stroke();
        }

        // --- ПЛИНТУС (где пол встречается со стеной) ---
        ctx.fillStyle = '#6b4f3a';
        ctx.fillRect(0, 210, 900, 10);

        // --- ПРЕДМЕТЫ (стоят на полу, прислонены к стене) ---
        objects.forEach(obj => {
            let x = obj.x * CELL_SIZE;
            
            if (obj.type === 'door') {
                // Дверь (на стене)
                ctx.fillStyle = '#8b6e4c';
                ctx.fillRect(x, 140, 35, 80);  // дверь
                ctx.fillStyle = '#c9b27c';
                ctx.fillRect(x + 10, 170, 15, 30);  // окошко в двери
                ctx.fillStyle = '#f0d090';
                ctx.fillRect(x + 25, 175, 5, 5);  // ручка
            } 
            else if (obj.type === 'stairs') {
                // Лестница (на полу)
                ctx.fillStyle = '#8b7a5a';
                ctx.fillRect(x, 150, 40, 60);
                for (let i = 0; i < 4; i++) {
                    ctx.fillStyle = '#6b5a3a';
                    ctx.fillRect(x + 5 + i*8, 160 + i*12, 5, 30);
                }
            } 
            else if (obj.type === 'window') {
                // Окно
                ctx.fillStyle = '#a5d0ff';
                ctx.fillRect(x + 5, 140, 30, 50);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(x + 18, 140, 4, 50);  // перекладина
                ctx.fillRect(x + 5, 165, 30, 4);    // перекладина
            }
        });

        // --- NPC (СТОЯТ НА ПОЛУ, ВИД СБОКУ) ---
        npcs.forEach(npc => {
            let npcX = npc.x * CELL_SIZE;
            
            // Тело (вид сбоку)
            ctx.fillStyle = npc.type === 'teacher' ? '#3a6790' : (npc.type === 'friend' ? '#7fb07f' : '#c96b8b');
            ctx.fillRect(npcX + 5, 160, 30, 60);  // тело
            ctx.fillStyle = '#f0d5b0';
            ctx.fillRect(npcX + 12, 150, 16, 16);  // голова
            
            // Имя над головой
            ctx.font = 'bold 14px "Courier New"';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.strokeText(npc.name, npcX, 140);
            ctx.fillText(npc.name, npcX, 140);
        });

        // --- МОТЯ (ВИД СБОКУ) ---
        let heroX = motyaX * CELL_SIZE;
        
        // Тело Моти
        ctx.fillStyle = '#d97706';  // оранжевый
        ctx.fillRect(heroX + 5, 160, 30, 60);
        ctx.fillStyle = '#f0d5b0';
        ctx.fillRect(heroX + 12, 150, 16, 16);  // голова
        
        // Имя
        ctx.font = 'bold 16px "Courier New"';
        ctx.fillStyle = '#ffd966';
        ctx.strokeStyle = 'black';
        ctx.strokeText('Мотя', heroX, 130);
        ctx.fillText('Мотя', heroX, 130);

        // --- ПОДСВЕТКА ЕСЛИ РЯДОМ NPC ---
        if (nearbyNPC && !dialogActive) {
            ctx.strokeStyle = '#ffd966';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 8]);
            ctx.strokeRect(nearbyNPC.x * CELL_SIZE - 5, 140, 50, 90);
            ctx.setLineDash([]);
        }

        // Статус
        let place = objects.find(o => o.x === motyaX);
        document.getElementById('statusText').innerText = place ? place.name : 'коридор 3 этажа';
    }

    // ---------- ДИАЛОГИ ----------
    function talkTo(npc) {
        if (!npc) return;
        
        currentNPC = npc;
        dialogActive = true;
        
        document.getElementById('speakerName').innerText = npc.name;
        document.getElementById('dialogText').innerText = npc.dialog.text;
        document.getElementById('choice1').innerText = '▶ ' + npc.dialog.options[0];
        document.getElementById('choice2').innerText = '▶ ' + npc.dialog.options[1];
        
        document.getElementById('dialogOverlay').style.display = 'block';
    }

    function closeDialog() {
        dialogActive = false;
        currentNPC = null;
        document.getElementById('dialogOverlay').style.display = 'none';
        renderGame();
    }

    document.getElementById('choice1').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[0];
            setTimeout(closeDialog, 1500);
        }
    });

    document.getElementById('choice2').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[1];
            setTimeout(closeDialog, 1500);
        }
    });

    // ---------- УПРАВЛЕНИЕ ----------
    function move(dx) {
        if (dialogActive) return;
        let newX = motyaX + dx;
        if (newX >= 0 && newX < WORLD_WIDTH) {
            motyaX = newX;
        }
        updateNearbyNPC();
        renderGame();
    }

    function updateNearbyNPC() {
        nearbyNPC = npcs.find(npc => npc.x === motyaX) || null;
    }

    function interact() {
        if (dialogActive) {
            closeDialog();
            return;
        }
        if (nearbyNPC) {
            talkTo(nearbyNPC);
        } else {
            let obj = objects.find(o => o.x === motyaX);
            if (obj) {
                if (obj.type === 'door') alert('🚪 ' + obj.name);
                else if (obj.type === 'stairs') alert('🪜 лестница');
                else if (obj.type === 'window') alert('🪟 окно');
            }
        }
    }

    // Кнопки
    document.getElementById('btnLeft').addEventListener('click', () => move(-1));
    document.getElementById('btnRight').addEventListener('click', () => move(1));
    document.getElementById('actionBtn').addEventListener('click', interact);

    // Клавиши
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') move(-1);
        if (e.key === 'ArrowRight') move(1);
        if (e.key === ' ' || e.key === 'e') {
            e.preventDefault();
            interact();
        }
        if (e.key === 'Escape' && dialogActive) closeDialog();
    });

    // Старт
    window.onload = () => {
        updateNearbyNPC();
        renderGame();
    };
})();
</script>
</body>
</html>
