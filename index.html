<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWIFLIX MAX — Мессенджер Сан-Фиерро</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: crisp-edges; image-rendering: pixelated; }
        body { background: #0a0a0a; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app { width: 1300px; max-width: 100%; height: 85vh; background: #0f0f0f; border: 3px solid #ff3333; display: flex; overflow: hidden; box-shadow: 8px 8px 0 rgba(255,51,51,0.3); }
        .sidebar { width: 320px; background: #080808; border-right: 2px solid #ff3333; display: flex; flex-direction: column; }
        .user-info { padding: 20px; background: #0a0a0a; border-bottom: 2px solid #ff3333; text-align: center; }
        .avatar-preview { width: 80px; height: 80px; background: #1a1a1a; border: 2px solid #ff3333; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .username-display { font-size: 16px; color: #ff3333; font-weight: bold; }
        .user-tag { font-size: 11px; color: #666; margin-top: 5px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #33ff33; margin-right: 6px; box-shadow: 0 0 4px #33ff33; }
        .nav-buttons { display: flex; padding: 12px; gap: 8px; border-bottom: 1px solid #ff3333; }
        .nav-btn { flex: 1; background: #0f0f0f; border: 1px solid #ff3333; color: #ccc; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .nav-btn.active { background: #ff3333; color: #0a0a0a; font-weight: bold; }
        .contacts-list { flex: 1; overflow-y: auto; padding: 8px; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 4px; background: #0c0c0c; border-left: 3px solid #ff3333; cursor: pointer; }
        .contact-item:hover { background: #141414; }
        .contact-avatar { width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #ff3333; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .contact-info { flex: 1; }
        .contact-name { color: #fff; font-size: 13px; font-weight: bold; }
        .contact-tag { font-size: 10px; color: #ff6666; }
        .add-friend { padding: 12px; border-top: 1px solid #ff3333; display: flex; gap: 8px; }
        .add-friend input { flex: 1; background: #0a0a0a; border: 1px solid #ff3333; padding: 10px; color: #fff; font-size: 12px; }
        .add-friend button { background: #ff3333; border: none; padding: 10px 16px; color: #0a0a0a; cursor: pointer; font-weight: bold; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        .chat-header { padding: 16px 20px; background: #0c0c0c; border-bottom: 2px solid #ff3333; display: flex; justify-content: space-between; align-items: center; }
        .chat-with { font-size: 16px; color: #ff5555; font-weight: bold; }
        .chat-tag { font-size: 11px; color: #888; margin-left: 8px; }
        .call-btn { background: #0f0f0f; border: 1px solid #ff3333; padding: 8px 18px; color: #ff5555; cursor: pointer; font-size: 12px; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        .message { max-width: 75%; padding: 10px 14px; font-size: 13px; word-break: break-word; }
        .message.outgoing { background: #ff3333; color: #0a0a0a; align-self: flex-end; border-left: 4px solid #fff; }
        .message.incoming { background: #141414; color: #eee; align-self: flex-start; border-left: 4px solid #ff3333; }
        .message-name { font-size: 10px; margin-bottom: 5px; opacity: 0.8; }
        .message-time { font-size: 9px; margin-top: 5px; opacity: 0.6; text-align: right; }
        .message-input-area { padding: 16px; background: #0c0c0c; border-top: 1px solid #ff3333; display: flex; gap: 10px; }
        .message-input { flex: 1; background: #0a0a0a; border: 1px solid #ff3333; padding: 12px; color: #fff; font-size: 13px; resize: none; }
        .send-btn { background: #ff3333; border: none; padding: 12px 24px; color: #0a0a0a; cursor: pointer; font-weight: bold; }
        .settings-panel { display: none; flex-direction: column; padding: 20px; gap: 20px; }
        .settings-row { display: flex; gap: 12px; align-items: center; background: #0c0c0c; padding: 15px; border-left: 3px solid #ff3333; }
        .settings-row label { width: 120px; color: #ff6666; }
        .settings-row input { flex: 1; background: #0a0a0a; border: 1px solid #ff3333; padding: 10px; color: #fff; }
        .settings-row button { background: #ff3333; border: none; padding: 8px 20px; color: #0a0a0a; cursor: pointer; }
        .call-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .call-modal-content { background: #0f0f0f; border: 3px solid #ff3333; padding: 40px; text-align: center; width: 350px; }
        .call-avatar { font-size: 64px; margin-bottom: 20px; }
        .call-name { font-size: 20px; color: #ff5555; margin-bottom: 15px; }
        .call-status { color: #aaa; margin-bottom: 30px; }
        .end-call-btn { background: #ff3333; border: none; padding: 12px 35px; color: #0a0a0a; cursor: pointer; font-weight: bold; }
        .auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .auth-box { background: #0f0f0f; border: 3px solid #ff3333; padding: 40px; width: 380px; text-align: center; }
        .auth-logo { font-size: 40px; color: #ff3333; margin-bottom: 20px; }
        .auth-title { font-size: 20px; color: #fff; margin-bottom: 25px; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #0a0a0a; border: 1px solid #ff3333; color: #fff; }
        .auth-btn { width: 100%; padding: 12px; background: #ff3333; border: none; color: #0a0a0a; cursor: pointer; margin-top: 5px; }
        .auth-switch { margin-top: 18px; color: #888; font-size: 12px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="auth-screen" id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">TWIFLIX MAX</div>
        <div class="auth-title" id="authTitle">ВХОД</div>
        <input type="text" class="auth-input" id="authLogin" placeholder="Логин (motya)">
        <input type="text" class="auth-input" id="authTag" placeholder="Тег (@565)">
        <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
        <button class="auth-btn" id="authBtn">ВОЙТИ</button>
        <div class="auth-switch" id="authSwitch">НЕТ АККАУНТА? ЗАРЕГИСТРИРОВАТЬСЯ</div>
    </div>
</div>

<div class="app" id="app" style="display: none;">
    <div class="sidebar">
        <div class="user-info">
            <div class="avatar-preview" id="userAvatar">👤</div>
            <div class="username-display" id="userDisplayName">Загрузка</div>
            <div class="user-tag" id="userTagDisplay">@??</div>
            <div style="margin-top: 10px;"><span class="status-dot"></span> ONLINE</div>
        </div>
        <div class="nav-buttons">
            <div class="nav-btn active" data-tab="chats">💬 ЧАТЫ</div>
            <div class="nav-btn" data-tab="friends">👥 ДРУЗЬЯ</div>
            <div class="nav-btn" data-tab="settings">⚙️ НАСТРОЙКИ</div>
        </div>
        <div class="contacts-list" id="contactsList"></div>
        <div class="add-friend">
            <input type="text" id="friendTag" placeholder="Тег друга (@timur777)">
            <button id="addFriendBtn">+ ДОБАВИТЬ</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div><span class="chat-with" id="chatWith">ВЫБЕРИТЕ ЧАТ</span><span class="chat-tag" id="chatTag"></span></div>
            <button class="call-btn" id="callBtn" style="display: none;">📞 ЗВОНОК</button>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align: center; color: #444; margin-top: 50px;">⚡ ВЫБЕРИТЕ СОБЕСЕДНИКА ⚡</div>
        </div>
        <div class="message-input-area" id="messageInputArea" style="display: none;">
            <textarea class="message-input" id="messageInput" rows="2" placeholder="ВВЕДИТЕ СООБЩЕНИЕ..."></textarea>
            <button class="send-btn" id="sendBtn">📤 ОТПРАВИТЬ</button>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-row"><label>ИМЯ:</label><input type="text" id="settingsName" placeholder="Новое имя"></div>
        <div class="settings-row"><label>ТЕГ:</label><input type="text" id="settingsTag" placeholder="@новыйтег"></div>
        <div class="settings-row"><label>АВАТАР (😎):</label><input type="text" id="settingsAvatar" placeholder="😎"></div>
        <div class="settings-row"><label>ПАРОЛЬ:</label><input type="password" id="settingsPassword" placeholder="Новый пароль"></div>
        <div class="settings-row"><button id="saveSettingsBtn">СОХРАНИТЬ</button></div>
    </div>
</div>

<div class="call-modal" id="callModal">
    <div class="call-modal-content">
        <div class="call-avatar" id="callAvatar">👤</div>
        <div class="call-name" id="callName">ИМЯ</div>
        <div class="call-status" id="callStatus">НАБИРАЕТ...</div>
        <button class="end-call-btn" id="endCallBtn">ЗАВЕРШИТЬ</button>
    </div>
</div>

<script>
    // Глобальная база всех пользователей (синхронизируется через localStorage между вкладками)
    let allUsers = JSON.parse(localStorage.getItem('twifflix_all_users')) || {};
    let allMessages = JSON.parse(localStorage.getItem('twifflix_all_messages')) || {};
    let currentUser = null;
    let currentChat = null;
    let callActive = false;
    let localStream = null;
    let peerConnection = null;
    let remoteAudio = null;

    // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
    function fullTag(username, tag) { return `${username}${tag}`; }
    function parseFullTag(full) {
        const match = full.match(/^([^@]+)(@.+)$/);
        if (match) return { username: match[1], tag: match[2] };
        return { username: full, tag: '' };
    }
    function saveAll() {
        localStorage.setItem('twifflix_all_users', JSON.stringify(allUsers));
        localStorage.setItem('twifflix_all_messages', JSON.stringify(allMessages));
        // Уведомляем другие вкладки
        localStorage.setItem('twifflix_sync', Date.now().toString());
    }

    // Синхронизация между вкладками
    window.addEventListener('storage', (e) => {
        if (e.key === 'twifflix_all_users' || e.key === 'twifflix_all_messages' || e.key === 'twifflix_sync') {
            allUsers = JSON.parse(localStorage.getItem('twifflix_all_users')) || {};
            allMessages = JSON.parse(localStorage.getItem('twifflix_all_messages')) || {};
            if (currentUser) {
                updateUserUI();
                renderFriendsList();
                if (currentChat) renderMessages(currentChat);
            }
        }
    });

    // ===== РЕГИСТРАЦИЯ =====
    function register(username, tag, password) {
        const fullId = fullTag(username, tag);
        if (allUsers[fullId]) return false;
        allUsers[fullId] = {
            username: username,
            tag: tag,
            password: password,
            avatar: '👤',
            friends: []
        };
        saveAll();
        return true;
    }

    function login(username, tag, password) {
        const fullId = fullTag(username, tag);
        if (allUsers[fullId] && allUsers[fullId].password === password) {
            currentUser = fullId;
            localStorage.setItem('twifflix_current', currentUser);
            return true;
        }
        return false;
    }

    // ===== СООБЩЕНИЯ =====
    function sendMessage(toFull, text) {
        if (!text.trim()) return;
        const chatId = [currentUser, toFull].sort().join('_');
        if (!allMessages[chatId]) allMessages[chatId] = [];
        allMessages[chatId].push({
            from: currentUser,
            to: toFull,
            text: text,
            time: new Date().toLocaleTimeString(),
            timestamp: Date.now()
        });
        saveAll();
        if (currentChat === toFull) renderMessages(toFull);
    }

    function getMessagesWith(fullId) {
        const chatId = [currentUser, fullId].sort().join('_');
        return allMessages[chatId] || [];
    }

    function renderMessages(fullId) {
        const msgs = getMessagesWith(fullId);
        const container = document.getElementById('messagesArea');
        container.innerHTML = '';
        msgs.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.from === currentUser ? 'outgoing' : 'incoming'}`;
            const name = msg.from === currentUser ? 'ВЫ' : (allUsers[msg.from]?.username || parseFullTag(msg.from).username);
            div.innerHTML = `
                <div class="message-name">${name}</div>
                <div>${escapeHtml(msg.text)}</div>
                <div class="message-time">${msg.time}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); }

    // ===== ДРУЗЬЯ =====
    function addFriend(tag) {
        if (!tag.startsWith('@')) tag = '@' + tag;
        let foundUser = null;
        for (let userId in allUsers) {
            if (userId.includes(tag)) {
                foundUser = userId;
                break;
            }
        }
        if (!foundUser) {
            alert('Пользователь не найден!');
            return false;
        }
        if (foundUser === currentUser) { alert('Нельзя добавить себя'); return false; }
        if (allUsers[currentUser].friends.includes(foundUser)) { alert('Уже в друзьях'); return false; }
        allUsers[currentUser].friends.push(foundUser);
        saveAll();
        renderFriendsList();
        return true;
    }

    function renderFriendsList() {
        const container = document.getElementById('contactsList');
        const currentTab = document.querySelector('.nav-btn.active')?.dataset.tab || 'chats';
        const friends = allUsers[currentUser]?.friends || [];
        container.innerHTML = '';
        
        if (currentTab === 'friends') {
            if (!friends.length) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:#555;">НЕТ ДРУЗЕЙ</div>';
                return;
            }
            friends.forEach(full => {
                const user = allUsers[full];
                if (!user) return;
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(full);
                div.innerHTML = `
                    <div class="contact-avatar">${user.avatar || '👤'}</div>
                    <div class="contact-info">
                        <div class="contact-name">${user.username}</div>
                        <div class="contact-tag">${user.tag}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        } else if (currentTab === 'chats') {
            const recent = new Set();
            for (let chatId in allMessages) {
                if (chatId.includes(currentUser)) {
                    const parts = chatId.split('_');
                    const other = parts[0] === currentUser ? parts[1] : parts[0];
                    if (friends.includes(other)) recent.add(other);
                }
            }
            if (!recent.size) {
                container.innerHTML = '<div style="text-align:center; padding:30px; color:#555;">НЕТ АКТИВНЫХ ЧАТОВ</div>';
                return;
            }
            recent.forEach(full => {
                const user = allUsers[full];
                if (!user) return;
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => openChat(full);
                div.innerHTML = `
                    <div class="contact-avatar">${user.avatar || '👤'}</div>
                    <div class="contact-info">
                        <div class="contact-name">${user.username}</div>
                        <div class="contact-tag">${user.tag}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
    }

    function openChat(fullId) {
        currentChat = fullId;
        const user = allUsers[fullId];
        if (!user) return;
        document.getElementById('chatWith').innerHTML = user.username;
        document.getElementById('chatTag').innerHTML = user.tag;
        document.getElementById('callBtn').style.display = 'block';
        document.getElementById('messageInputArea').style.display = 'flex';
        renderMessages(fullId);
    }

    // ===== НАСТРОЙКИ =====
    function updateUserUI() {
        const user = allUsers[currentUser];
        if (!user) return;
        document.getElementById('userDisplayName').innerHTML = user.username;
        document.getElementById('userTagDisplay').innerHTML = user.tag;
        document.getElementById('userAvatar').innerHTML = user.avatar || '👤';
        document.getElementById('settingsName').value = user.username;
        document.getElementById('settingsTag').value = user.tag;
        document.getElementById('settingsAvatar').value = user.avatar || '👤';
    }

    function saveSettings() {
        const newName = document.getElementById('settingsName').value.trim();
        const newTag = document.getElementById('settingsTag').value.trim();
        const newAvatar = document.getElementById('settingsAvatar').value.trim();
        const newPassword = document.getElementById('settingsPassword').value.trim();
        if (newName && newTag) {
            const oldFull = currentUser;
            const newFull = fullTag(newName, newTag);
            if (oldFull !== newFull && allUsers[newFull]) {
                alert('Пользователь с таким тегом уже существует');
                return;
            }
            const userData = allUsers[oldFull];
            allUsers[newFull] = { ...userData, username: newName, tag: newTag, avatar: newAvatar };
            if (newPassword) allUsers[newFull].password = newPassword;
            delete allUsers[oldFull];
            for (let u in allUsers) {
                const idx = allUsers[u].friends.indexOf(oldFull);
                if (idx !== -1) allUsers[u].friends[idx] = newFull;
            }
            const newMessages = {};
            for (let chatId in allMessages) {
                if (chatId.includes(oldFull)) {
                    const newId = chatId.replace(oldFull, newFull);
                    newMessages[newId] = allMessages[chatId];
                } else {
                    newMessages[chatId] = allMessages[chatId];
                }
            }
            allMessages = newMessages;
            currentUser = newFull;
            localStorage.setItem('twifflix_current', currentUser);
            saveAll();
            updateUserUI();
            renderFriendsList();
            if (currentChat) openChat(currentChat);
            alert('Настройки сохранены');
        }
    }

    // ===== ЗВОНКИ =====
    async function startRealCall(fullId) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => {
                if (!remoteAudio) {
                    remoteAudio = new Audio();
                    remoteAudio.srcObject = event.streams[0];
                    remoteAudio.play();
                }
            };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            const user = allUsers[fullId];
            document.getElementById('callName').innerHTML = user?.username || fullId;
            document.getElementById('callStatus').innerHTML = 'СОЕДИНЕНИЕ...';
            document.getElementById('callModal').style.display = 'flex';
            callActive = true;
        } catch(e) { alert('Нет доступа к микрофону'); }
    }

    function endRealCall() {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peerConnection) peerConnection.close();
        if (remoteAudio) { remoteAudio.pause(); remoteAudio = null; }
        callActive = false;
        document.getElementById('callModal').style.display = 'none';
    }

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    function initApp() {
        updateUserUI();
        renderFriendsList();
        setInterval(() => {
            if (currentUser) {
                renderFriendsList();
                if (currentChat) renderMessages(currentChat);
            }
        }, 2000);
    }

    // ===== СОБЫТИЯ =====
    document.getElementById('authBtn').onclick = () => {
        const username = document.getElementById('authLogin').value.trim();
        const tag = document.getElementById('authTag').value.trim();
        const password = document.getElementById('authPassword').value;
        const isLogin = document.getElementById('authTitle').innerText === 'ВХОД';
        if (isLogin) {
            if (login(username, tag, password)) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                initApp();
            } else alert('Неверные данные');
        } else {
            if (register(username, tag, password)) {
                alert('Регистрация успешна! Войдите.');
                document.getElementById('authTitle').innerText = 'ВХОД';
                document.getElementById('authBtn').innerText = 'ВОЙТИ';
                document.getElementById('authSwitch').innerHTML = 'НЕТ АККАУНТА? ЗАРЕГИСТРИРОВАТЬСЯ';
            } else alert('Пользователь уже существует');
        }
    };

    document.getElementById('authSwitch').onclick = () => {
        const isLogin = document.getElementById('authTitle').innerText === 'ВХОД';
        if (isLogin) {
            document.getElementById('authTitle').innerText = 'РЕГИСТРАЦИЯ';
            document.getElementById('authBtn').innerText = 'ЗАРЕГИСТРИРОВАТЬСЯ';
            document.getElementById('authSwitch').innerHTML = 'УЖЕ ЕСТЬ АККАУНТ? ВОЙТИ';
        } else {
            document.getElementById('authTitle').innerText = 'ВХОД';
            document.getElementById('authBtn').innerText = 'ВОЙТИ';
            document.getElementById('authSwitch').innerHTML = 'НЕТ АККАУНТА? ЗАРЕГИСТРИРОВАТЬСЯ';
        }
    };

    document.getElementById('addFriendBtn').onclick = () => {
        let tag = document.getElementById('friendTag').value.trim();
        if (tag) addFriend(tag);
    };

    document.getElementById('sendBtn').onclick = () => {
        if (currentChat) {
            const txt = document.getElementById('messageInput').value.trim();
            if (txt) { sendMessage(currentChat, txt); document.getElementById('messageInput').value = ''; }
        }
    };

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); }
    });

    document.getElementById('callBtn').onclick = () => { if (currentChat) startRealCall(currentChat); };
    document.getElementById('endCallBtn').onclick = () => endRealCall();
    document.getElementById('saveSettingsBtn').onclick = () => saveSettings();

    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            document.getElementById('settingsPanel').style.display = tab === 'settings' ? 'flex' : 'none';
            document.querySelector('.chat-area').style.display = tab === 'settings' ? 'none' : 'flex';
            if (tab !== 'settings') renderFriendsList();
        };
    });

    const saved = localStorage.getItem('twifflix_current');
    if (saved && allUsers[saved]) {
        currentUser = saved;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        initApp();
    }
</script>
</body>
