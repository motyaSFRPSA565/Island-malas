<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОСТРОВ МАЛАСА: ПОБЕГ</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; text-shadow: 2px 2px #000; pointer-events: none; }
        #noise-bar { width: 200px; height: 10px; border: 1px solid #fff; margin-top: 5px; }
        #noise-fill { width: 0%; height: 100%; background: #f00; transition: width 0.2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        #menu, #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; background: #b00; color: #fff; border: none; margin: 10px; border-radius: 5px; }
        #mobile-controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 50px; box-sizing: border-box; }
        .m-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        @media (max-width: 800px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<div id="ui">
    <div id="mission-info">МИССИЯ: ТЮРЬМА (ОБУЧЕНИЕ)</div>
    <div id="hp-bar">HP: 100</div>
    <div id="ammo-ui" style="display:none">ДРОБОВИК: 8 / 32</div>
    <div id="noise-container" style="display:none">ШУМ: <div id="noise-bar"><div id="noise-fill"></div></div></div>
    <div id="timer-ui" style="display:none">ВРЕМЯ: 03:00</div>
</div>

<div id="crosshair"></div>

<div id="menu">
    <h1>ОСТРОВ МАЛАСА</h1>
    <p>Вы были рабом на этом острове долгие годы. Пора уходить.</p>
    <button onclick="startGame()">НАЧАТЬ ПОБЕГ</button>
    <button onclick="resetSave()" style="background:#444">СБРОСИТЬ ПРОГРЕСС</button>
</div>

<div id="game-over" style="display:none">
    <h1 id="result-title">ВЫ ПОГИБЛИ</h1>
    <p id="result-desc"></p>
    <button onclick="location.reload()">ПОПРОБОВАТЬ СНОВА</button>
</div>

<div id="mobile-controls">
    <div class="m-btn" id="m-up">W</div>
    <div style="display:flex; gap:10px;">
        <div class="m-btn" id="m-f">F</div>
        <div class="m-btn" id="m-fire">FIRE</div>
    </div>
</div>

<script>
/** ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ **/
let scene, camera, renderer, clock, player, flashLight, weapon;
let enemies = [], allies = [], objects = [];
let currentMission = localStorage.getItem('malasa_mission') || 1;
let hp = 100, ammo = 0, hasWeapon = false, isCrouching = false, noise = 0;
let gameState = 'menu';
let missionTimer = 180;

const keys = {};

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.05);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Свет
    const ambient = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambient);

    flashLight = new THREE.SpotLight(0xffffff, 2, 20, Math.PI/6);
    flashLight.visible = false;
    scene.add(flashLight);

    setupMission(currentMission);

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'KeyF') toggleFlashlight();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', () => { if(hasWeapon) fire(); });

    animate();
}

function setupMission(num) {
    // Очистка сцены
    enemies.forEach(e => scene.remove(e.mesh));
    objects.forEach(o => scene.remove(o));
    enemies = []; objects = []; allies = [];

    // Пол
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    if(num == 1) { // Тюрьма
        createWall(0, 0, -10, 20, 5);
        spawnAlly(3, 0, -5, "Медведь с чаем");
        document.getElementById('mission-info').innerText = "МИССИЯ 1: ТЮРЬМА (Найдите выход)";
    } 
    else if(num == 2) { // Подземелье
        document.getElementById('noise-container').style.display = 'block';
        spawnEnemy(0, 0, -15, 'cloaker');
        document.getElementById('mission-info').innerText = "МИССИЯ 2: ПОДЗЕМЕЛЬЕ (Тихо!)";
    }
    else if(num == 3) { // Лагерь
        hasWeapon = true;
        ammo = 32;
        document.getElementById('ammo-ui').style.display = 'block';
        spawnEnemy(5, 0, -20, 'bulldozer');
        spawnEnemy(-5, 0, -25, 'bulldozer');
        document.getElementById('mission-info').innerText = "МИССИЯ 3: ЛАГЕРЬ (Бой)";
    }
    else if(num == 4) { // Доки
        document.getElementById('timer-ui').style.display = 'block';
        spawnEnemy(0, 0, -30, 'giga');
        document.getElementById('mission-info').innerText = "МИССИЯ 4: ДОКИ (Убить Босса)";
    }
}

/** ГЕНЕРАЦИЯ СУЩЕСТВ **/
function spawnEnemy(x, y, z, type) {
    const group = new THREE.Group();
    let color = 0x556b2f; // Бульдозер
    if(type === 'cloaker') color = 0x111111;
    if(type === 'giga') color = 0xffd700;

    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshPhongMaterial({color}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({color: 0xffffff}));
    head.position.y = 1.3;
    group.add(body, head);
    group.position.set(x, 1, z);
    scene.add(group);
    enemies.push({ mesh: group, type, hp: type==='giga'?500:100 });
}

function spawnAlly(x, y, z, type) {
    const bear = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.8), new THREE.MeshPhongMaterial({color: 0x8b4513}));
    bear.add(body);
    bear.position.set(x, 0.8, z);
    scene.add(bear);
    allies.push({ mesh: bear, type });
}

function createWall(x, y, z, w, h) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 1), new THREE.MeshPhongMaterial({color: 0x444444}));
    wall.position.set(x, h/2, z);
    scene.add(wall);
    objects.push(wall);
}

/** ЛОГИКА **/
function toggleFlashlight() {
    flashLight.visible = !flashLight.visible;
}

function fire() {
    if(ammo <= 0) return;
    ammo--;
    document.getElementById('ammo-ui').innerText = `ДРОБОВИК: ${ammo} / 32`;
    
    // Простая проверка попадания лучем
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh), true);
    
    if(intersects.length > 0) {
        const targetMesh = intersects[0].object.parent;
        const enemy = enemies.find(e => e.mesh === targetMesh);
        if(enemy) {
            enemy.hp -= 50;
            if(enemy.hp <= 0) {
                scene.remove(enemy.mesh);
                checkMissionProgress();
            }
        }
    }
}

function checkMissionProgress() {
    const aliveEnemies = enemies.filter(e => e.hp > 0).length;
    if(aliveEnemies === 0) {
        if(currentMission < 4) {
            currentMission++;
            localStorage.setItem('malasa_mission', currentMission);
            alert("Миссия выполнена! Переход к следующей...");
            setupMission(currentMission);
        } else {
            endGame("ЛЕГЕНДА", "Вы победили Гига-Бульдозера и сбежали с острова!");
        }
    }
}

function endGame(title, desc) {
    gameState = 'over';
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-desc').innerText = desc;
}

function update(delta) {
    if(gameState !== 'playing') return;

    const moveSpeed = (keys['ShiftLeft'] ? 2 : 5) * delta;
    isCrouching = keys['ShiftLeft'];

    // Движение (упрощенно)
    if(keys['KeyW']) camera.translateZ(-moveSpeed);
    if(keys['KeyS']) camera.translateZ(moveSpeed);
    if(keys['KeyA']) camera.translateX(-moveSpeed);
    if(keys['KeyD']) camera.translateX(moveSpeed);

    camera.position.y = isCrouching ? 1 : 1.7;

    // Фонарик следует за камерой
    flashLight.position.copy(camera.position);
    flashLight.target.position.set(
        camera.position.x - Math.sin(camera.rotation.y),
        camera.position.y,
        camera.position.z - Math.cos(camera.rotation.y)
    );
    flashLight.target.updateMatrixWorld();

    // Шум в стелс-миссии
    if(currentMission == 2) {
        if(!isCrouching && (keys['KeyW'] || keys['KeyS'])) noise = Math.min(100, noise + 1);
        else noise = Math.max(0, noise - 0.5);
        document.getElementById('noise-fill').style.width = noise + '%';
        if(noise >= 100) { hp -= 0.5; }
    }

    // Таймер в финале
    if(currentMission == 4) {
        missionTimer -= delta;
        let mins = Math.floor(missionTimer/60);
        let secs = Math.floor(missionTimer%60);
        document.getElementById('timer-ui').innerText = `ВРЕМЯ: ${mins}:${secs < 10 ? '0'+secs : secs}`;
        if(missionTimer <= 0) endGame("СМЕРТЬ", "Вы не успели на корабль...");
    }

    // Логика врагов (преследование)
    enemies.forEach(en => {
        if(en.hp > 0) {
            const dist = en.mesh.position.distanceTo(camera.position);
            if(dist < 10) {
                en.mesh.lookAt(camera.position.x, 1, camera.position.z);
                en.mesh.translateZ(0.03);
                if(dist < 1.5) {
                    hp -= 0.2;
                    document.getElementById('hp-bar').innerText = `HP: ${Math.floor(hp)}`;
                    if(hp <= 0) endGame("СМЕРТЬ", "Остров Маласа поглотил вас...");
                }
            }
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    update(delta);
    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    gameState = 'playing';
    init();
}

function resetSave() {
    localStorage.removeItem('malasa_mission');
    location.reload();
}

// Управление мышью (Lock Pointer)
document.addEventListener('click', () => {
    if(gameState === 'playing') document.body.requestPointerLock();
});
document.addEventListener('mousemove', (e) => {
    if(document.pointerLockElement === document.body) {
        camera.rotation.y -= e.movementX * 0.002;
    }
});
</script>
</body>
</html>
