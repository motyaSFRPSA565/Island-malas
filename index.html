<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENSEC: ОХРАНА БАНКА</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a1a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            width: 1000px;
            height: 700px;
            background: linear-gradient(145deg, #1a2f3f, #0f1e2a);
            border: 5px solid #c49a6c;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 50px #ffaa0033;
        }

        .top-panel {
            display: flex;
            gap: 20px;
            height: 60%;
        }

        .camera-view {
            flex: 2;
            background: #2a3f4f;
            border: 4px solid #6b8e4c;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .camera-screen {
            flex: 1;
            background: #1a2f3f;
            border: 3px solid #8b5a2b;
            border-radius: 15px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .camera-label {
            color: #6b8e4c;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            text-align: center;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .camera-btn {
            background: #2d5a3e;
            border: 3px solid #c49a6c;
            border-radius: 15px;
            padding: 10px;
            color: white;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .camera-btn:hover {
            background: #3e7a5a;
            transform: scale(1.02);
        }

        .camera-btn.active {
            background: #c49a6c;
            color: #1a2f3f;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .status-panel {
            background: #2a3f4f;
            border: 4px solid #6b8e4c;
            border-radius: 20px;
            padding: 20px;
            color: white;
        }

        .status-title {
            font-size: 24px;
            color: #c49a6c;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 18px;
        }

        .action-panel {
            background: #2a3f4f;
            border: 4px solid #6b8e4c;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-btn {
            background: #8b5a2b;
            border: 3px solid #c49a6c;
            border-radius: 30px;
            padding: 15px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #a8753a;
            transform: scale(1.02);
        }

        .action-btn.danger {
            background: #8b2a2a;
        }

        .action-btn.danger:hover {
            background: #aa3a3a;
        }

        .bottom-panel {
            height: 30%;
            background: #2a3f4f;
            border: 4px solid #6b8e4c;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 20px;
            overflow-x: auto;
        }

        .person-card {
            min-width: 100px;
            height: 100px;
            background: #1a2f3f;
            border: 3px solid #8b5a2b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .person-emoji {
            font-size: 40px;
        }

        .person-type {
            font-size: 12px;
            color: white;
            text-align: center;
        }

        .person-banker {
            border-color: #ffd700;
        }

        .person-civilian {
            border-color: #6b8e4c;
        }

        .person-payday {
            border-color: #ff4444;
            animation: pulse 1s infinite;
        }

        .person-police {
            border-color: #4444ff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px #ff4444; }
            50% { box-shadow: 0 0 20px #ff0000; }
            100% { box-shadow: 0 0 10px #ff4444; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .end-screen {
            background: linear-gradient(145deg, #1a2f3f, #0a1a2a);
            border: 5px solid #c49a6c;
            border-radius: 40px;
            padding: 60px;
            text-align: center;
            color: white;
        }

        .end-title {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .end-subtitle {
            font-size: 32px;
            color: #c49a6c;
            margin-bottom: 40px;
        }

        .end-btn {
            background: #2d5a3e;
            border: 4px solid #c49a6c;
            border-radius: 40px;
            padding: 20px 60px;
            font-size: 32px;
            color: white;
            cursor: pointer;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="top-panel">
            <div class="camera-view">
                <div class="camera-screen" id="cameraScreen">
                    <!-- Сюда будут подгружаться SVG -->
                </div>
                <div class="camera-label">Камера: ХОЛЛ</div>
                <div class="camera-grid">
                    <div class="camera-btn active" onclick="changeCamera(0)">ХОЛЛ</div>
                    <div class="camera-btn" onclick="changeCamera(1)">ЗАЛ 1</div>
                    <div class="camera-btn" onclick="changeCamera(2)">ЗАЛ 2</div>
                    <div class="camera-btn" onclick="changeCamera(3)">КАССЫ</div>
                    <div class="camera-btn" onclick="changeCamera(4)">ВХОД</div>
                    <div class="camera-btn" onclick="changeCamera(5)">СЕЙФ</div>
                </div>
            </div>
            <div class="right-panel">
                <div class="status-panel">
                    <div class="status-title">СТАТУС</div>
                    <div class="status-item">
                        <span>Время:</span>
                        <span id="timeDisplay">22:00</span>
                    </div>
                    <div class="status-item">
                        <span>Людей в банке:</span>
                        <span id="peopleCount">12</span>
                    </div>
                    <div class="status-item">
                        <span>Полиция:</span>
                        <span id="policeStatus">❌ НЕ ВЫЗВАНА</span>
                    </div>
                    <div class="status-item">
                        <span>Ограбление:</span>
                        <span id="robberyStatus">❌ НЕТ</span>
                    </div>
                </div>
                <div class="action-panel">
                    <div class="action-btn" onclick="callPolice()">📞 ВЫЗВАТЬ ПОЛИЦИЮ</div>
                    <div class="action-btn" id="gunBtn" style="display: none;" onclick="useGun()">🔫 ВЗЯТЬ ПИСТОЛЕТ</div>
                    <div class="action-btn danger" onclick="restartGame()">🔄 НОВАЯ СМЕНА</div>
                </div>
            </div>
        </div>
        <div class="bottom-panel" id="peoplePanel">
            <!-- Сюда будут добавляться люди -->
        </div>
    </div>

    <div class="overlay" id="endOverlay">
        <div class="end-screen">
            <div class="end-title" id="endTitle">КОНЦОВКА</div>
            <div class="end-subtitle" id="endSubtitle"></div>
            <div class="end-btn" onclick="restartFromEnd()">🔄 НАЧАТЬ ЗАНОВО</div>
        </div>
    </div>

    <script>
        // ===== КОНСТАНТЫ =====
        let currentCamera = 0;
        let gameTime = 22 * 60; // 22:00 в минутах
        let policeCalled = false;
        let policeArrivalTime = null;
        let robberyStarted = false;
        let robberyTime = null;
        let gunMode = false;
        let gameEnded = false;

        // Люди в банке
        let people = [];
        
        // Камеры (зоны банка)
        const cameras = [
            { name: 'ХОЛЛ', people: [] },
            { name: 'ЗАЛ 1', people: [] },
            { name: 'ЗАЛ 2', people: [] },
            { name: 'КАССЫ', people: [] },
            { name: 'ВХОД', people: [] },
            { name: 'СЕЙФ', people: [] }
        ];

        // ===== СОЗДАНИЕ ЛЮДЕЙ =====
        function generatePeople() {
            people = [];
            
            // Банкиры (белые пиджаки)
            for (let i = 0; i < 5; i++) {
                people.push({
                    id: i,
                    type: 'banker',
                    name: `Банкир ${i+1}`,
                    camera: Math.floor(Math.random() * 6),
                    emoji: '👔',
                    color: '#ffffff'
                });
            }
            
            // Гражданские (разная одежда)
            const civilianEmojis = ['👕', '🧥', '👗', '🧢', '👟'];
            for (let i = 0; i < 10; i++) {
                people.push({
                    id: i + 5,
                    type: 'civilian',
                    name: `Гражданин ${i+1}`,
                    camera: Math.floor(Math.random() * 6),
                    emoji: civilianEmojis[Math.floor(Math.random() * civilianEmojis.length)],
                    color: '#6b8e4c'
                });
            }
            
            // Бандиты PAYDAY (в масках)
            const paydayEmojis = ['🎭', '👺', '👹', '👽'];
            for (let i = 0; i < 4; i++) {
                people.push({
                    id: i + 15,
                    type: 'payday',
                    name: 'Бандит PAYDAY',
                    camera: Math.floor(Math.random() * 6),
                    emoji: paydayEmojis[Math.floor(Math.random() * paydayEmojis.length)],
                    color: '#ff4444',
                    active: true,
                    spawnTime: 22 * 60 + i * 5 // появляются в разное время
                });
            }
            
            // Полиция (по вызову)
            // Будет добавлена позже
        }

        // ===== ОБНОВЛЕНИЕ ОТОБРАЖЕНИЯ =====
        function updateDisplay() {
            // Время
            let hours = Math.floor(gameTime / 60);
            let minutes = gameTime % 60;
            document.getElementById('timeDisplay').innerText = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            
            // Люди в банке
            document.getElementById('peopleCount').innerText = people.filter(p => p.type !== 'police').length;
            
            // Статус полиции
            document.getElementById('policeStatus').innerHTML = policeCalled ? '🚓 ВЫЗВАНА' : '❌ НЕ ВЫЗВАНА';
            
            // Статус ограбления
            document.getElementById('robberyStatus').innerHTML = robberyStarted ? '🔴 ИДЁТ' : '❌ НЕТ';
            
            // Кнопка пистолета
            document.getElementById('gunBtn').style.display = robberyStarted ? 'block' : 'none';
            
            // Отображение людей в нижней панели
            let panel = document.getElementById('peoplePanel');
            panel.innerHTML = '';
            
            people.forEach(p => {
                if (p.type === 'police') return;
                
                let card = document.createElement('div');
                card.className = `person-card person-${p.type}`;
                card.innerHTML = `
                    <div class="person-emoji">${p.emoji}</div>
                    <div class="person-type">${p.name}</div>
                `;
                panel.appendChild(card);
            });
            
            // Отображение на камере
            updateCameraView();
        }

        // ===== ОБНОВЛЕНИЕ КАМЕРЫ =====
        function updateCameraView() {
            let screen = document.getElementById('cameraScreen');
            screen.innerHTML = '';
            
            let cameraPeople = people.filter(p => p.camera === currentCamera && p.type !== 'police');
            
            // SVG сцена
            let svg = `
                <svg width="100%" height="100%" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet">
                    <rect width="400" height="300" fill="#1a2f3f"/>
                    <rect x="50" y="50" width="300" height="200" fill="#2a3f4f" stroke="#8b5a2b" stroke-width="3"/>
            `;
            
            // Расставляем людей на камере
            cameraPeople.forEach((p, i) => {
                let x = 100 + (i * 50) % 200;
                let y = 100 + Math.floor(i / 4) * 50;
                
                svg += `
                    <circle cx="${x}" cy="${y}" r="20" fill="${p.color}" stroke="#000" stroke-width="2"/>
                    <text x="${x}" y="${y+5}" text-anchor="middle" fill="white" font-size="20">${p.emoji}</text>
                `;
                
                if (p.type === 'payday') {
                    svg += `
                        <circle cx="${x-8}" cy="${y-8}" r="3" fill="#ff0"/>
                        <circle cx="${x+8}" cy="${y-8}" r="3" fill="#ff0"/>
                    `;
                }
            });
            
            svg += `</svg>`;
            screen.innerHTML = svg;
        }

        // ===== СМЕНА КАМЕРЫ =====
        window.changeCamera = function(cam) {
            currentCamera = cam;
            document.querySelectorAll('.camera-btn').forEach((btn, i) => {
                if (i === cam) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            document.querySelector('.camera-label').innerText = `Камера: ${cameras[cam].name}`;
            updateCameraView();
        };

        // ===== ВЫЗОВ ПОЛИЦИИ =====
        window.callPolice = function() {
            if (policeCalled) return;
            
            policeCalled = true;
            policeArrivalTime = gameTime + 5; // полиция приедет через 5 минут
            
            // Проверка, вызвали ли до ограбления
            if (!robberyStarted) {
                // Концовка "Всевидящий"
                endGame('allSeeing', 'ВСЕВИДЯЩИЙ', 'Полиция приехала до ограбления! Бандиты арестованы.');
                return;
            }
            
            showMessage('📞 Полиция вызвана! Прибудет через 5 минут');
        };

        // ===== ВЗЯТЬ ПИСТОЛЕТ =====
        window.useGun = function() {
            gunMode = true;
            showMessage('🔫 Пистолет в руках! Стреляй по бандитам');
        };

        // ===== СТРЕЛЬБА (при клике на бандита) =====
        function shootBandit(banditId) {
            if (!gunMode || !robberyStarted) return;
            
            let bandit = people.find(p => p.id === banditId);
            if (bandit && bandit.type === 'payday') {
                bandit.active = false;
                people = people.filter(p => p.id !== banditId);
                showMessage('🔫 Бандит уничтожен!');
                
                // Проверка, остались ли бандиты
                let remaining = people.filter(p => p.type === 'payday').length;
                if (remaining === 0) {
                    endGame('hero', 'ГЕРОЙ', 'Ты в одиночку уничтожил всех бандитов!');
                }
            }
        }

        // ===== ИГРОВОЙ ЦИКЛ =====
        setInterval(() => {
            if (gameEnded) return;
            
            gameTime++;
            
            // Проверка появления бандитов
            people.forEach(p => {
                if (p.type === 'payday' && p.spawnTime === gameTime && !robberyStarted) {
                    robberyStarted = true;
                    robberyTime = gameTime;
                    showMessage('🔴 ОГРАБЛЕНИЕ НАЧАЛОСЬ!', 3);
                }
            });
            
            // Проверка прибытия полиции
            if (policeArrivalTime === gameTime) {
                if (robberyStarted) {
                    // Концовка "Вызов" (полиция приехала во время ограбления)
                    endGame('call', 'ВЫЗОВ', 'Полиция приехала и арестовала бандитов!');
                }
            }
            
            // Проверка времени окончания (23:00)
            if (gameTime >= 23 * 60) {
                if (!robberyStarted) {
                    // Концовка "Всевидящий", если полиция не вызывалась
                    endGame('allSeeing', 'ВСЕВИДЯЩИЙ', 'Смена окончена. Бандиты так и не решились напасть.');
                } else {
                    // Бандиты ушли?
                    endGame('escape', 'ПОБЕГ', 'Бандиты скрылись до приезда полиции...');
                }
            }
            
            updateDisplay();
        }, 1000);

        // ===== КОНЦОВКА =====
        function endGame(type, title, subtitle) {
            gameEnded = true;
            document.getElementById('endTitle').innerText = title;
            document.getElementById('endSubtitle').innerText = subtitle;
            document.getElementById('endOverlay').style.display = 'flex';
            
            // Статистика
            console.log(`Концовка: ${type}`);
        }

        // ===== ПЕРЕЗАПУСК =====
        window.restartGame = function() {
            if (!confirm('Начать новую смену?')) return;
            resetGame();
        };

        window.restartFromEnd = function() {
            document.getElementById('endOverlay').style.display = 'none';
            resetGame();
        };

        function resetGame() {
            currentCamera = 0;
            gameTime = 22 * 60;
            policeCalled = false;
            policeArrivalTime = null;
            robberyStarted = false;
            robberyTime = null;
            gunMode = false;
            gameEnded = false;
            
            generatePeople();
            
            document.querySelectorAll('.camera-btn').forEach((btn, i) => {
                if (i === 0) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            document.querySelector('.camera-label').innerText = 'Камера: ХОЛЛ';
            
            updateDisplay();
        }

        // ===== ПОКАЗ СООБЩЕНИЙ =====
        function showMessage(text, duration = 2) {
            // Можно добавить всплывающие сообщения
            console.log(text);
        }

        // ===== СТАРТ =====
        generatePeople();
        updateDisplay();
    </script>
</body>
    </html>
