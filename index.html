<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОСТРОВ МАЛАСА: ПОБЕГ</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; color: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #menu { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: #b00; color: #fff; border: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid lime; transform: translate(-50%, -50%); border-radius: 50%; }
    </style>
</head>
<body>

<div id="ui">
    <div id="hp-ui">HP: 100</div>
    <div id="msg">МИССИЯ 1: НАЙДИ ВЫХОД (БЕЛЫЙ КУБ)</div>
</div>
<div id="crosshair"></div>

<div id="menu">
    <h1>ОСТРОВ МАЛАСА</h1>
    <button onclick="startGame()">НАЧАТЬ ПОБЕГ</button>
</div>

<script>
let scene, camera, renderer, clock, player;
let enemies = [], objects = [];
let keys = {};
let isStarted = false;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a); // Темно-серый фон
    scene.fog = new THREE.Fog(0x1a1a1a, 1, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 5); // Игрок стоит чуть поодаль от центра

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // СВЕТ (ВАЖНО: без него всё будет черным)
    const ambient = new THREE.AmbientLight(0xffffff, 0.8); 
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // ПОЛ
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // ВЫХОД (Белый куб)
    const exit = new THREE.Mesh(
        new THREE.BoxGeometry(2, 4, 2),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff })
    );
    exit.position.set(0, 2, -20);
    scene.add(exit);
    objects.push(exit);

    // ВРАГ (Бульдозер)
    const enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 3, 1.5),
        new THREE.MeshStandardMaterial({ color: 0x556b2f })
    );
    enemy.position.set(5, 1.5, -10);
    scene.add(enemy);
    enemies.push(enemy);

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
}

function update() {
    if (!isStarted) return;
    const delta = clock.getDelta();
    const speed = 5 * delta;

    if (keys['KeyW']) camera.translateZ(-speed);
    if (keys['KeyS']) camera.translateZ(speed);
    if (keys['KeyA']) camera.translateX(-speed);
    if (keys['KeyD']) camera.translateX(speed);

    // Чтобы игрок не улетал в небо
    camera.position.y = 1.7;

    // Простая логика врагов
    enemies.forEach(en => {
        en.lookAt(camera.position);
        if (en.position.distanceTo(camera.position) < 10) {
            en.translateZ(2 * delta);
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    update();
    if (renderer) renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    init();
    isStarted = true;
    animate();
    
    // Захват мыши
    document.body.requestPointerLock();
}

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement === document.body) {
        camera.rotation.y -= e.movementX * 0.003;
    }
});

window.addEventListener('resize', () => {
    if (camera) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
</script>
</body>
</html>
