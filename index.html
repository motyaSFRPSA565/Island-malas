<!DOCTYPE html>
<html>
<head>
    <title>SAN FIERRO: TOTAL WARFARE</title>
    <style>
        body { margin: 0; background: #004466; overflow: hidden; font-family: 'Courier New', monospace; color: #0f0; }
        canvas { display: block; background: #333; margin: auto; border: 4px solid #555; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        button { padding: 15px 30px; font-size: 20px; background: #008800; color: white; border: none; cursor: pointer; margin: 10px; }
        button:hover { background: #00ff00; color: black; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: #f00;">SAN FIERRO: TOTAL WARFARE</h1>
    <p>ВЫБЕРИ СТОРОНУ:</p>
    <button onclick="init('PAYDAY')">PAYDAY (ТЕРРОРИСТЫ)</button>
    <button onclick="init('SWAT')" style="background: #0055ff;">SWAT (СПЕЦНАЗ)</button>
    <p style="font-size: 12px;">WASD - Ходить | ЛКМ - Стрелять | B - Магазин</p>
</div>

<div id="ui">
    КОМАНДА: <span id="team">-</span> | $: <span id="money">800</span> | HP: <span id="hp">100</span><br>
    ЦЕЛЬ: <span id="task">ВЫБЕРИТЕ КОМАНДУ</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let team = '', player = {x: 400, y: 300, hp: 100, money: 800}, bullets = [], bots = [], keys = {};

function init(chosenTeam) {
    team = chosenTeam;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('team').innerText = team;
    document.getElementById('task').innerText = team === 'PAYDAY' ? 'ВЗОРВАТЬ 3 ОПОРЫ' : 'ЗАЩИТИТЬ МОСТ';
    
    // Спавним ботов врагов
    for(let i=0; i<7; i++) {
        bots.push({
            x: Math.random() * 800, 
            y: team === 'PAYDAY' ? 100 : 500, 
            color: team === 'PAYDAY' ? 'blue' : 'red',
            hp: 100
        });
    }
    loop();
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;
window.onmousedown = e => {
    bullets.push({x: player.x, y: player.y, tx: e.clientX - canvas.offsetLeft, ty: e.clientY - canvas.offsetTop});
};

function loop() {
    canvas.width = 800; canvas.height = 600;
    
    // 1. РИСУЕМ МОСТ
    ctx.fillStyle = '#004466'; ctx.fillRect(0,0,800,600); // Вода
    ctx.fillStyle = '#444'; ctx.fillRect(150, 0, 500, 600); // Полотно моста
    ctx.strokeStyle = '#666'; ctx.lineWidth = 5;
    for(let i=0; i<600; i+=40) { ctx.strokeRect(150, i, 500, 2); } // Шпалы

    // 2. ИГРОК
    if(keys['KeyW']) player.y -= 3; if(keys['KeyS']) player.y += 3;
    if(keys['KeyA']) player.x -= 3; if(keys['KeyD']) player.x += 3;
    ctx.fillStyle = team === 'PAYDAY' ? 'red' : 'blue';
    ctx.beginPath(); ctx.arc(player.x, player.y, 15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'white'; ctx.fillText("ВЫ", player.x-10, player.y-20);

    // 3. ПУЛИ
    bullets.forEach((b, i) => {
        let angle = Math.atan2(b.ty - b.y, b.tx - b.x);
        b.x += Math.cos(angle) * 10; b.y += Math.sin(angle) * 10;
        ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 5, 5);
        
        // Попадание в ботов
        bots.forEach((bot, bi) => {
            if(Math.hypot(b.x-bot.x, b.y-bot.y) < 20) {
                bot.hp -= 20; bullets.splice(i, 1);
                if(bot.hp <= 0) { bots.splice(bi, 1); player.money += 300; }
            }
        });
    });

    // 4. БОТЫ
    bots.forEach(bot => {
        ctx.fillStyle = bot.color;
        ctx.beginPath(); ctx.arc(bot.x, bot.y, 15, 0, Math.PI*2); ctx.fill();
        // Простой ИИ (идут к центру)
        bot.y += (player.y > bot.y ? 1 : -1);
    });

    // ОБНОВЛЕНИЕ UI
    document.getElementById('money').innerText = player.money;
    
    // Пасхалка: Драго
    if(Math.random() < 0.01) console.log("Я ДОЛЖЕН!");

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
