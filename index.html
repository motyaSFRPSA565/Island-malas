<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAN FIERRO: TOTAL WARFARE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #d00; color: #fff; border: none; margin: 10px; border-radius: 5px; }
        #info { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 24px;">💰 $<span id="money">800</span> | HP: <span id="hp">100</span></div>
    <div>STREAK: <span id="streak">0</span> | TEAM: <b id="teamText">-</b></div>
    <div id="mission" style="margin-top: 10px; color: yellow;">ЗАДАЧА: ВЫБЕРИТЕ СТОРОНУ</div>
</div>
<div id="crosshair"></div>

<div id="menu">
    <h1 style="color: #f00; letter-spacing: 5px;">SAN FIERRO: TOTAL WARFARE</h1>
    <p>PAYDAY (TERROR) vs SWAT (SPECIAL OPS)</p>
    <button onclick="joinGame('PAYDAY')">ИГРАТЬ ЗА PAYDAY (Взорвать мост)</button>
    <button onclick="joinGame('SWAT')" style="background: #0055ff;">ИГРАТЬ ЗА SWAT (Защитить)</button>
    <div style="margin-top: 20px;">Управление: WASD + Мышь | Пробел - Прыжок</div>
</div>

<div id="info">Пасхалки: Драго бегает в консоли | Фото Майка Маласа на опоре</div>

<script src="https://cdnjs.cloudflare.com"></script>

<script>
let scene, camera, renderer, team = "";
let players = [], bullets = [];
let keys = {};

function init() {
    // 1. СЦЕНА И КАМЕРА
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 100, 800);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 100, 50);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 2. ОКРУЖЕНИЕ (МОСТ И ЗАЛИВ)
    createWorld();

    // 3. ЦИКЛ ИГРЫ
    animate();
}

function createWorld() {
    // Вода
    const water = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({color: 0x004466}));
    water.rotation.x = -Math.PI / 2;
    water.position.y = -20;
    scene.add(water);

    // Мост (Полотно)
    const bridge = new THREE.Mesh(new THREE.BoxGeometry(30, 4, 1200), new THREE.MeshPhongMaterial({color: 0x222222}));
    scene.add(bridge);

    // Рельсы
    const rail1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 1200), new THREE.MeshPhongMaterial({color: 0x888888}));
    rail1.position.set(-5, 2.1, 0);
    scene.add(rail1);
    const rail2 = rail1.clone(); rail2.position.set(-8, 2.1, 0);
    scene.add(rail2);

    // Опоры (3 точки для бомбы)
    for(let i = -1; i <= 1; i++) {
        const pillar = new THREE.Mesh(new THREE.BoxGeometry(40, 60, 20), new THREE.MeshPhongMaterial({color: 0x444444}));
        pillar.position.set(0, -30, i * 300);
        scene.add(pillar);
        
        // Пасхалка: Фото Майка Маласа (символично - белый куб)
        if(i === 0) {
            const malas = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 0.1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            malas.position.set(0, 10, i * 300 + 10.1);
            scene.add(malas);
        }
    }

    // Снайперская скала
    const rock = new THREE.Mesh(new THREE.ConeGeometry(40, 100, 6), new THREE.MeshPhongMaterial({color: 0x554433}));
    rock.position.set(80, 10, 0);
    scene.add(rock);

    // Красные фермы моста
    for(let j = -600; j < 600; j += 80) {
        const frame = new THREE.Mesh(new THREE.BoxGeometry(32, 40, 2), new THREE.MeshPhongMaterial({color: 0xaa0000}));
        frame.position.set(0, 20, j);
        scene.add(frame);
    }
}

function createPlayerModel(isTerror) {
    const group = new THREE.Group();
    // Тело
    const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 0.5), new THREE.MeshPhongMaterial({color: isTerror ? 0x333333 : 0x000066}));
    group.add(body);
    // Голова / Маска
    const mask = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshPhongMaterial({color: isTerror ? 0xffffff : 0x222222}));
    mask.position.y = 1.3;
    group.add(mask);
    return group;
}

function joinGame(chosenTeam) {
    team = chosenTeam;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('teamText').innerText = team;
    document.getElementById('mission').innerText = team === "PAYDAY" ? "ЦЕЛЬ: ВЗОРВАТЬ 3 ОПОРЫ" : "ЦЕЛЬ: ЗАЩИТИТЬ МОСТ";
    
    document.body.requestPointerLock();
    
    // Спавн
    camera.position.y = 2;
    camera.position.z = team === "PAYDAY" ? -550 : 550;
    if(team === "SWAT") camera.lookAt(0, 2, 0);
    
    // Создаем врагов (ботов для примера 8 на 8)
    for(let i = 0; i < 8; i++) {
        let bot = createPlayerModel(team === "SWAT");
        bot.position.set(Math.random()*20-10, 1, team === "SWAT" ? -400 : 400);
        scene.add(bot);
    }
}

// Управление
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;
window.onmousemove = (e) => {
    if(document.pointerLockElement) {
        camera.rotation.y -= e.movementX * 0.002;
    }
};

function animate() {
    requestAnimationFrame(animate);
    
    if(team !== "") {
        const speed = 0.4;
        if(keys['KeyW']) camera.translateZ(-speed);
        if(keys['KeyS']) camera.translateZ(speed);
        if(keys['KeyA']) camera.translateX(-speed);
        if(keys['KeyD']) camera.translateX(speed);
        camera.position.y = 2; // Фиксация на мосту
    }

    renderer.render(scene, camera);
}

init();

// ПАСХАЛКА В КОНСОЛИ
console.log("%cЯ ДОЛЖЕН! - Драго бежит за тобой!", "background: red; color: white; font-size: 25px; font-weight: bold;");
console.log("Медведь с чайником спрятан под мостом...");
</script>
</body>
</html>
