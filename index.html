<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SAN FIERRO: CS 1.6 STYLE</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
        #hud { position: absolute; bottom: 20px; left: 20px; color: #00ff00; font-size: 24px; pointer-events: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid #0f0; transform: translate(-50%, -50%); pointer-events: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,60,0,0.8); padding: 30px; border: 3px solid #0f0; color: #0f0; text-align: center; }
        button { background: #004400; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; margin: 5px; }
        button:hover { background: #00ff00; color: #000; }
        #shop { display: none; position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; color: gold; border: 1px solid gold; }
    </style>
</head>
<body>

<div id="hud">HP: 100 | AP: 100 | $: 800 <br> WEAPON: GLOCK-18</div>
<div id="crosshair"></div>
<div id="shop">B - SHOP: [1] AK-47 [2] M4A1 [3] AWP</div>

<div id="menu">
    <h1>SAN FIERRO: TOTAL WARFARE</h1>
    <p>ВЫБЕРИТЕ КОМАНДУ</p>
    <button onclick="startGame('T')">[1] TERRORISTS (PAYDAY)</button>
    <button onclick="startGame('CT')">[2] Counter-Terrorists (SWAT)</button>
</div>

<script src="https://cdnjs.cloudflare.com"></script>

<script>
let scene, camera, renderer, team = "";
let players = [], bullets = [], bots = [];
let move = { f: false, b: false, l: false, r: false };
let clock = new THREE.Clock();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5588aa); // Олдскульное небо
    scene.fog = new THREE.Fog(0x5588aa, 10, 400);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: false }); // Пиксельность как в 1.6
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light);

    createMap();
    animate();
}

function createMap() {
    // Вода
    const water = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0x224466}));
    water.rotation.x = -Math.PI/2; water.position.y = -15;
    scene.add(water);

    // Мост
    const bridge = new THREE.Mesh(new THREE.BoxGeometry(20, 2, 800), new THREE.MeshLambertMaterial({color: 0x333333}));
    scene.add(bridge);

    // Рельсы
    for(let i = -400; i < 400; i+=2) {
        const sleeper = new THREE.Mesh(new THREE.BoxGeometry(6, 0.2, 0.8), new THREE.MeshBasicMaterial({color: 0x221100}));
        sleeper.position.set(0, 1.1, i);
        scene.add(sleeper);
    }

    // Укрытия (Ящики)
    for(let i = 0; i < 20; i++) {
        const box = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshLambertMaterial({color: 0x664422}));
        box.position.set(Math.random()*10-5, 2.5, Math.random()*600-300);
        scene.add(box);
    }

    // Снайперская скала
    const rock = new THREE.Mesh(new THREE.BoxGeometry(40, 50, 40), new THREE.MeshLambertMaterial({color: 0x444444}));
    rock.position.set(50, 10, 0);
    scene.add(rock);
}

function spawnBot(teamType, zPos) {
    const botGeo = new THREE.BoxGeometry(1.5, 3, 1);
    const botMat = new THREE.MeshLambertMaterial({color: teamType === 'T' ? 0xff0000 : 0x0000ff});
    const bot = new THREE.Mesh(botGeo, botMat);
    bot.position.set(Math.random()*10-5, 2.5, zPos);
    bot.userData = { health: 100, team: teamType, lastShot: 0 };
    scene.add(bot);
    bots.push(bot);
}

function startGame(chosenTeam) {
    team = chosenTeam;
    document.getElementById('menu').style.display = 'none';
    document.body.requestPointerLock();
    
    camera.position.set(0, 4, team === 'T' ? -380 : 380);
    if(team === 'CT') camera.rotation.y = Math.PI;

    // Спавним 4 бота союзника и 5 врагов
    for(let i = 0; i < 4; i++) spawnBot(team, camera.position.z + (Math.random()*20-10));
    for(let i = 0; i < 5; i++) spawnBot(team === 'T' ? 'CT' : 'T', team === 'T' ? 300 : -300);
}

// Управление
document.addEventListener('keydown', e => {
    if(e.code === 'KeyW') move.f = true;
    if(e.code === 'KeyS') move.b = true;
    if(e.code === 'KeyA') move.l = true;
    if(e.code === 'KeyD') move.r = true;
    if(e.code === 'KeyB') document.getElementById('shop').style.display = 'block';
});
document.addEventListener('keyup', e => {
    if(e.code === 'KeyW') move.f = false;
    if(e.code === 'KeyS') move.b = false;
    if(e.code === 'KeyA') move.l = false;
    if(e.code === 'KeyD') move.r = false;
});

document.addEventListener('mousemove', e => {
    if(document.pointerLockElement) {
        camera.rotation.y -= e.movementX * 0.003;
    }
});

document.addEventListener('mousedown', () => {
    if(document.pointerLockElement) shoot();
});

function shoot() {
    const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
    bullet.position.copy(camera.position);
    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    bullet.userData = { dir: dir, life: 100 };
    bullets.push(bullet);
    scene.add(bullet);
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    if(team !== "") {
        // Движение игрока
        if(move.f) camera.translateZ(-0.5);
        if(move.b) camera.translateZ(0.5);
        if(move.l) camera.translateX(-0.3);
        if(move.r) camera.translateX(0.3);
        camera.position.y = 4;

        // Логика пуль
        bullets.forEach((b, i) => {
            b.position.addScaledVector(b.userData.dir, 2);
            b.userData.life--;
            if(b.userData.life <= 0) {
                scene.remove(b);
                bullets.splice(i, 1);
            }
            // Попадание в ботов
            bots.forEach((bot, bi) => {
                if(b.position.distanceTo(bot.position) < 2) {
                    bot.userData.health -= 50;
                    if(bot.userData.health <= 0) {
                        scene.remove(bot);
                        bots.splice(bi, 1);
                        console.log("KILLED!");
                    }
                }
            });
        });

        // Логика ботов (двигаются и стреляют)
        bots.forEach(bot => {
            bot.lookAt(camera.position);
            bot.translateZ(0.05); // Боты идут к тебе
        });
    }

    renderer.render(scene, camera);
}

init();
console.log("ДРАГО КРИЧИТ: Я ДОЛЖЕН!");
</script>
</body>
</html>
