<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWIFLIX MAX - San Fierro Edition</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --primary: #ff3333;
            --secondary: #222;
            --text: #fff;
            --gray: #888;
        }

        * { box-sizing: border-box; font-family: 'Press Start 2P', cursive; image-rendering: pixelated; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; font-size: 10px; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid var(--primary); }
        input { background: #000; border: 2px solid var(--primary); color: #fff; padding: 10px; margin: 5px; width: 250px; outline: none; }
        button { background: var(--primary); border: none; color: #fff; padding: 10px 20px; cursor: pointer; margin: 5px; text-transform: uppercase; }
        button:hover { background: #cc0000; }

        /* Main Layout */
        #app { display: none; grid-template-columns: 300px 1fr; height: 100vh; }
        
        /* Sidebar */
        #sidebar { border-right: 4px solid var(--primary); display: flex; flex-direction: column; background: #050505; }
        .user-profile { padding: 15px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid var(--secondary); cursor: pointer; transition: 0.2s; }
        .contact-item:hover { background: #1a1a1a; }
        .contact-item.active { border-left: 5px solid var(--primary); background: #111; }

        /* Chat Area */
        #chat-window { display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 15px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border: 2px solid; }
        .msg.me { align-self: flex-end; border-color: var(--primary); color: var(--primary); }
        .msg.them { align-self: flex-start; border-color: var(--gray); color: var(--gray); }
        
        #input-area { padding: 15px; border-top: 2px solid var(--primary); display: flex; }
        #msg-input { flex: 1; }

        /* Call Modal */
        #call-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #000; border: 4px solid var(--primary); padding: 30px; text-align: center; z-index: 200; }

        /* Easter Egg */
        #bear-easter { position: fixed; bottom: 10px; right: 10px; font-size: 30px; cursor: pointer; z-index: 50; }

        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            #sidebar { display: block; }
            #chat-window { display: none; }
            .mobile-back { display: block !important; }
        }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="auth-screen">
        <h1 style="color: var(--primary); margin-bottom: 30px;">TWIFLIX MAX</h1>
        <div id="demo-buttons">
            <button onclick="demoLogin('motya@565')">MOTYA@565</button>
            <button onclick="demoLogin('drago@100')">DRAGO@100</button>
            <button onclick="demoLogin('timur@777')">TIMUR@777</button>
        </div>
        <p>ИЛИ ВОЙДИТЕ:</p>
        <input type="text" id="login-tag" placeholder="@TAG">
        <input type="password" id="login-pass" placeholder="PASSWORD">
        <button onclick="login()">ВХОД / РЕГИСТРАЦИЯ</button>
    </div>

    <!-- Main App -->
    <div id="app">
        <div id="sidebar">
            <div class="user-profile" id="my-profile">
                <span id="my-avatar">👤</span>
                <div onclick="openSettings()" style="cursor:pointer">
                    <div id="my-name">User</div>
                    <div id="my-tag" style="font-size: 8px; color: var(--primary);">@tag</div>
                </div>
            </div>
            <div style="padding: 10px;">
                <input type="text" id="search-friend" placeholder="ПОИСК @TAG" style="width: 100%; font-size: 8px;">
                <button onclick="addFriend()" style="width: 100%; font-size: 8px;">ДОБАВИТЬ</button>
            </div>
            <div class="contact-list" id="contact-list"></div>
        </div>

        <div id="chat-window">
            <div id="chat-header">
                <div>
                    <button class="mobile-back" style="display:none;" onclick="backToContacts()"><</button>
                    <span id="chat-with-name">ВЫБЕРИТЕ ЧАТ</span>
                </div>
                <button id="call-btn" onclick="startCall()" style="display:none;">📞 ПОЗВОНИТЬ</button>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="СООБЩЕНИЕ...">
                <button onclick="sendMessage()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <!-- Call Modal -->
    <div id="call-modal">
        <h2 id="call-status">ВЫЗОВ...</h2>
        <div id="call-timer">00:00</div>
        <button onclick="endCall()" style="background: #555;">ЗАВЕРШИТЬ</button>
    </div>

    <!-- Easter Egg -->
    <div id="bear-easter" onclick="alert('Чай будешь?')">🧸☕</div>

    <script>
        let currentUser = null;
        let activeChat = null;
        let db = JSON.parse(localStorage.getItem('twiflix_db')) || { users: {}, chats: {} };

        // Инициализация демо-аккаунтов
        const demos = {
            'motya@565': { name: 'Motya', pass: '123', avatar: '😎' },
            'drago@100': { name: 'Drago', pass: '123', avatar: '🏃' },
            'timur@777': { name: 'Timur', pass: '123', avatar: '🔥' }
        };
        Object.keys(demos).forEach(tag => {
            if(!db.users[tag]) db.users[tag] = { ...demos[tag], friends: [] };
        });

        function save() { 
            localStorage.setItem('twiflix_db', JSON.stringify(db)); 
            renderContacts();
        }

        function demoLogin(tag) {
            document.getElementById('login-tag').value = tag;
            document.getElementById('login-pass').value = '123';
            login();
        }

        function login() {
            const tag = document.getElementById('login-tag').value;
            const pass = document.getElementById('login-pass').value;

            if(!tag || !pass) return alert('Заполни поля!');

            if(db.users[tag]) {
                if(db.users[tag].pass !== pass) return alert('Неверный пароль!');
            } else {
                db.users[tag] = { name: tag.split('@')[0], pass: pass, avatar: '👤', friends: [] };
                save();
            }

            currentUser = tag;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            updateUI();
        }

        function updateUI() {
            document.getElementById('my-name').innerText = db.users[currentUser].name;
            document.getElementById('my-tag').innerText = '@' + currentUser;
            document.getElementById('my-avatar').innerText = db.users[currentUser].avatar;
            renderContacts();
        }

        function addFriend() {
            const tag = document.getElementById('search-friend').value;
            if(db.users[tag] && tag !== currentUser) {
                if(!db.users[currentUser].friends.includes(tag)) {
                    db.users[currentUser].friends.push(tag);
                    save();
                }
            } else { alert('Пользователь не найден!'); }
        }

        function renderContacts() {
            const list = document.getElementById('contact-list');
            list.innerHTML = '';
            db.users[currentUser].friends.forEach(tag => {
                const u = db.users[tag];
                const div = document.createElement('div');
                div.className = `contact-item ${activeChat === tag ? 'active' : ''}`;
                div.innerHTML = `${u.avatar} ${u.name} <br> <small style="font-size:7px; color:var(--gray)">@${tag}</small>`;
                div.onclick = () => selectChat(tag);
                list.appendChild(div);
            });
        }

        function selectChat(tag) {
            activeChat = tag;
            document.getElementById('chat-with-name').innerText = db.users[tag].name;
            document.getElementById('call-btn').style.display = 'block';
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').style.display = 'none';
                document.getElementById('chat-window').style.display = 'flex';
            }
            renderMessages();
            renderContacts();
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text || !activeChat) return;

            const chatID = [currentUser, activeChat].sort().join('_');
            if(!db.chats[chatID]) db.chats[chatID] = [];

            db.chats[chatID].push({ from: currentUser, text: text, time: Date.now() });
            
            // Пасхалка Драго
            if(activeChat === 'drago@100' && text.toLowerCase().includes('я должен')) {
                setTimeout(() => {
                    db.chats[chatID].push({ from: 'drago@100', text: 'КТО ТЕБЕ ЭТО СКАЗАЛ?', time: Date.now() });
                    save();
                    renderMessages();
                }, 1000);
            }

            input.value = '';
            save();
            renderMessages();
        }

        function renderMessages() {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            const chatID = [currentUser, activeChat].sort().join('_');
            if(db.chats[chatID]) {
                db.chats[chatID].forEach(m => {
                    const div = document.createElement('div');
                    div.className = `msg ${m.from === currentUser ? 'me' : 'them'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
            }
            box.scrollTop = box.scrollHeight;
        }

        // --- WebRTC Mock Simulation ---
        let peerConnection;
        function startCall() {
            document.getElementById('call-modal').style.display = 'block';
            document.getElementById('call-status').innerText = 'ЗВОНОК: ' + db.users[activeChat].name;
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                // Здесь инициализируется RTCPeerConnection
                console.log("Микрофон получен для WebRTC");
            }).catch(err => alert("Ошибка микрофона: " + err));
        }

        function endCall() {
            document.getElementById('call-modal').style.display = 'none';
        }

        function openSettings() {
            const newName = prompt("Новое имя:", db.users[currentUser].name);
            const newAvatar = prompt("Новый аватар (эмодзи):", db.users[currentUser].avatar);
            if(newName) db.users[currentUser].name = newName;
            if(newAvatar) db.users[currentUser].avatar = newAvatar;
            save();
            updateUI();
        }

        function backToContacts() {
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('chat-window').style.display = 'none';
        }

        // Синхронизация вкладок
        window.addEventListener('storage', () => {
            db = JSON.parse(localStorage.getItem('twiflix_db'));
            if(activeChat) renderMessages();
            renderContacts();
        });

        // Enter to send
        document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
