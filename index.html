<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWIFLIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a1a;
            font-family: 'Courier New', 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            width: 1200px;
            max-width: 100%;
            height: 800px;
            max-height: 90vh;
            background: #1a1a2e;
            border: 4px solid #ff3333;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 51, 51, 0.2);
        }

        /* ЛЕВАЯ ПАНЕЛЬ (ДРУЗЬЯ И ЧАТЫ) */
        .sidebar {
            width: 300px;
            background: #0f0f1a;
            border-right: 2px solid #ff3333;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: #1a1a2e;
            border-bottom: 2px solid #ff3333;
            text-align: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #ff3333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 10px;
            border: 3px solid #fff;
        }

        .username {
            font-size: 20px;
            color: #ff3333;
            font-weight: bold;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .nav-buttons {
            display: flex;
            padding: 15px;
            gap: 10px;
            border-bottom: 1px solid #ff3333;
        }

        .nav-btn {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #ff3333;
            color: #fff;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .nav-btn.active {
            background: #ff3333;
            color: #0a0a1a;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 5px;
            background: #1a1a2e;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 3px solid #ff3333;
        }

        .contact-item:hover {
            background: #2a2a3e;
        }

        .contact-item.active {
            background: #2a2a3e;
            border-left: 3px solid #ff3333;
        }

        .contact-avatar {
            width: 40px;
            height: 40px;
            background: #2a2a3e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            color: #fff;
            font-weight: bold;
        }

        .contact-status {
            font-size: 10px;
            color: #888;
        }

        .contact-status.online {
            color: #4aff4a;
        }

        .add-friend {
            padding: 15px;
            border-top: 1px solid #ff3333;
            display: flex;
            gap: 10px;
        }

        .add-friend input {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #ff3333;
            padding: 10px;
            color: #fff;
            font-family: monospace;
        }

        .add-friend button {
            background: #ff3333;
            border: none;
            padding: 10px 15px;
            color: #0a0a1a;
            cursor: pointer;
            font-weight: bold;
        }

        /* ПРАВАЯ ПАНЕЛЬ (ЧАТ) */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f1a;
        }

        .chat-header {
            padding: 20px;
            background: #1a1a2e;
            border-bottom: 2px solid #ff3333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-with {
            font-size: 18px;
            color: #ff3333;
        }

        .call-btn {
            background: #1a1a2e;
            border: 1px solid #ff3333;
            padding: 8px 20px;
            color: #ff3333;
            cursor: pointer;
            transition: 0.2s;
        }

        .call-btn:hover {
            background: #ff3333;
            color: #0a0a1a;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }

        .message.outgoing {
            background: #ff3333;
            color: #0a0a1a;
            align-self: flex-end;
            border-radius: 15px 15px 0 15px;
        }

        .message.incoming {
            background: #1a1a2e;
            color: #fff;
            align-self: flex-start;
            border-radius: 15px 15px 15px 0;
            border: 1px solid #ff3333;
        }

        .message-name {
            font-size: 12px;
            margin-bottom: 5px;
            color: #ff3333;
        }

        .message-text {
            font-size: 14px;
            word-break: break-word;
        }

        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.6;
            text-align: right;
        }

        .message-input-area {
            padding: 20px;
            background: #1a1a2e;
            border-top: 2px solid #ff3333;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #ff3333;
            padding: 12px;
            color: #fff;
            font-family: monospace;
            resize: none;
            font-size: 14px;
        }

        .send-btn {
            background: #ff3333;
            border: none;
            padding: 12px 25px;
            color: #0a0a1a;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        /* МОДАЛЬНОЕ ОКНО ЗВОНКА */
        .call-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .call-modal-content {
            background: #1a1a2e;
            border: 4px solid #ff3333;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            width: 400px;
        }

        .call-avatar {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .call-name {
            font-size: 28px;
            color: #ff3333;
            margin-bottom: 10px;
        }

        .call-status {
            font-size: 16px;
            color: #fff;
            margin-bottom: 30px;
        }

        .call-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .call-btn-end {
            background: #ff3333;
            border: none;
            padding: 15px 40px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        /* РЕГИСТРАЦИЯ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .auth-box {
            background: #1a1a2e;
            border: 4px solid #ff3333;
            border-radius: 30px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }

        .auth-logo {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff3333;
        }

        .auth-title {
            font-size: 28px;
            color: #fff;
            margin-bottom: 30px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f0f1a;
            border: 1px solid #ff3333;
            color: #fff;
            font-family: monospace;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #ff3333;
            border: none;
            color: #0a0a1a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-switch {
            margin-top: 20px;
            color: #888;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <div class="auth-logo">💬 TWIFLIX MAX</div>
            <div class="auth-title" id="authTitle">Вход</div>
            <input type="text" class="auth-input" id="authUsername" placeholder="Имя пользователя">
            <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
            <button class="auth-btn" id="authBtn">Войти</button>
            <div class="auth-switch" id="authSwitch">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <div class="app" id="app" style="display: none;">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="sidebar">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="username" id="userName">Загрузка...</div>
                <div class="status">🟢 онлайн</div>
            </div>
            <div class="nav-buttons">
                <div class="nav-btn active" data-tab="chats">💬 Чаты</div>
                <div class="nav-btn" data-tab="friends">👥 Друзья</div>
            </div>
            <div class="contacts-list" id="contactsList">
                <!-- Список контактов -->
            </div>
            <div class="add-friend">
                <input type="text" id="friendName" placeholder="Имя друга @cente.com">
                <button id="addFriendBtn">➕</button>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ (ЧАТ) -->
        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-with" id="chatWith">Выберите чат</div>
                <button class="call-btn" id="callBtn" style="display: none;">📞 Звонок</button>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #888; padding: 50px;">
                    Выберите друга чтобы начать общение
                </div>
            </div>
            <div class="message-input-area" id="messageInputArea" style="display: none;">
                <textarea class="message-input" id="messageInput" rows="2" placeholder="Введите сообщение..."></textarea>
                <button class="send-btn" id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛ ЗВОНКА -->
    <div class="call-modal" id="callModal">
        <div class="call-modal-content">
            <div class="call-avatar" id="callAvatar">👤</div>
            <div class="call-name" id="callName">Имя</div>
            <div class="call-status" id="callStatus">Вызов...</div>
            <div class="call-buttons">
                <button class="call-btn-end" id="endCallBtn">📞 Завершить</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ =====
        let currentUser = null;
        let users = JSON.parse(localStorage.getItem('twifflix_users')) || {};
        let messages = JSON.parse(localStorage.getItem('twifflix_messages')) || {};
        let friends = JSON.parse(localStorage.getItem('twifflix_friends')) || {};
        let currentChat = null;
        let callActive = false;
        let callTimer = null;

        // ===== СОХРАНЕНИЕ =====
        function saveData() {
            localStorage.setItem('twifflix_users', JSON.stringify(users));
            localStorage.setItem('twifflix_messages', JSON.stringify(messages));
            localStorage.setItem('twifflix_friends', JSON.stringify(friends));
        }

        // ===== АВТОРИЗАЦИЯ =====
        function register(username, password) {
            if (users[username]) {
                alert('Пользователь уже существует!');
                return false;
            }
            users[username] = { password, avatar: getRandomAvatar() };
            friends[username] = [];
            saveData();
            alert('Регистрация успешна!');
            return true;
        }

        function login(username, password) {
            if (users[username] && users[username].password === password) {
                currentUser = username;
                localStorage.setItem('twifflix_current', username);
                return true;
            }
            alert('Неверное имя или пароль!');
            return false;
        }

        function getRandomAvatar() {
            const avatars = ['👤', '😎', '🔥', '🎮', '🐻', '🏃', '🛡️', '⚡'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        // ===== ДРУЗЬЯ =====
        function addFriend(username) {
            if (!username) return;
            if (username === currentUser) {
                alert('Нельзя добавить себя в друзья!');
                return;
            }
            if (!users[username]) {
                alert('Пользователь не найден!');
                return;
            }
            if (friends[currentUser].includes(username)) {
                alert('Уже в друзьях!');
                return;
            }
            friends[currentUser].push(username);
            saveData();
            loadContacts();
            alert(`${username} добавлен в друзья!`);
        }

        // ===== СООБЩЕНИЯ =====
        function sendMessage(to, text) {
            if (!text.trim()) return;
            const chatId = getChatId(currentUser, to);
            if (!messages[chatId]) messages[chatId] = [];
            messages[chatId].push({
                from: currentUser,
                to: to,
                text: text,
                time: new Date().toLocaleTimeString(),
                date: new Date().toISOString()
            });
            saveData();
            if (currentChat === to) loadMessages(to);
            
            // Отправляем уведомление в Telegram (опционально)
            sendToTelegram(to, text);
        }

        function getChatId(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function loadMessages(withUser) {
            const chatId = getChatId(currentUser, withUser);
            const msgs = messages[chatId] || [];
            const area = document.getElementById('messagesArea');
            area.innerHTML = '';
            
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.from === currentUser ? 'outgoing' : 'incoming'}`;
                div.innerHTML = `
                    <div class="message-name">${msg.from === currentUser ? 'Вы' : msg.from}</div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                    <div class="message-time">${msg.time}</div>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== ЗВОНКИ (симуляция) =====
        function startCall(withUser) {
            const modal = document.getElementById('callModal');
            document.getElementById('callName').innerText = withUser;
            document.getElementById('callAvatar').innerHTML = users[withUser]?.avatar || '👤';
            document.getElementById('callStatus').innerHTML = '📞 Вызов...';
            modal.style.display = 'flex';
            callActive = true;
            
            // Симуляция ответа через 3 секунды
            setTimeout(() => {
                if (callActive) {
                    document.getElementById('callStatus').innerHTML = '🔴 В разговоре...';
                    // Добавляем звук звонка (симуляция)
                }
            }, 3000);
        }

        function endCall() {
            callActive = false;
            document.getElementById('callModal').style.display = 'none';
            if (callTimer) clearTimeout(callTimer);
        }

        // ===== ТЕЛЕГРАМ ИНТЕГРАЦИЯ =====
        function sendToTelegram(to, text) {
            // Отправляем уведомление в Telegram (опционально)
            // fetch(`https://api.telegram.org/bot8655630023:AAHx11sDOmY7JemehAcaLfEyP907qRgzOKM/sendMessage`, {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({
            //         chat_id: '6763299388',
            //         text: `💬 ${currentUser} -> ${to}: ${text}`
            //     })
            // });
        }

        // ===== ИНТЕРФЕЙС =====
        function loadContacts() {
            const list = document.getElementById('contactsList');
            const friendList = friends[currentUser] || [];
            const currentTab = document.querySelector('.nav-btn.active').dataset.tab;
            
            list.innerHTML = '';
            
            if (currentTab === 'friends') {
                friendList.forEach(friend => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.onclick = () => selectChat(friend);
                    div.innerHTML = `
                        <div class="contact-avatar">${users[friend]?.avatar || '👤'}</div>
                        <div class="contact-info">
                            <div class="contact-name">${friend}</div>
                            <div class="contact-status online">🟢 онлайн</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
                if (friendList.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Нет друзей. Добавьте кого-нибудь!</div>';
                }
            } else {
                // Чаты (недавние диалоги)
                const recentChats = new Set();
                for (let chatId in messages) {
                    if (chatId.includes(currentUser)) {
                        const other = chatId.replace(currentUser, '').replace('_', '').replace(currentUser, '');
                        if (other && friendList.includes(other)) {
                            recentChats.add(other);
                        }
                    }
                }
                recentChats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.onclick = () => selectChat(chat);
                    div.innerHTML = `
                        <div class="contact-avatar">${users[chat]?.avatar || '👤'}</div>
                        <div class="contact-info">
                            <div class="contact-name">${chat}</div>
                            <div class="contact-status">💬 есть сообщения</div>
                        </div>
                    `;
                    list.appendChild(div);
                });
                if (recentChats.size === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:20px; color:#888;">Нет активных чатов</div>';
                }
            }
        }

        function selectChat(username) {
            currentChat = username;
            document.getElementById('chatWith').innerHTML = username;
            document.getElementById('chatWith').style.color = '#ff3333';
            document.getElementById('callBtn').style.display = 'block';
            document.getElementById('messageInputArea').style.display = 'flex';
            loadMessages(username);
        }

        // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПОЛЬЗОВАТЕЛЯ =====
        function updateUserUI() {
            document.getElementById('userName').innerHTML = currentUser;
            document.getElementById('userAvatar').innerHTML = users[currentUser]?.avatar || '👤';
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function initApp() {
            updateUserUI();
            loadContacts();
            
            // Проверяем, есть ли сохранённый чат
            const savedChat = localStorage.getItem('twifflix_last_chat');
            if (savedChat && friends[currentUser].includes(savedChat)) {
                selectChat(savedChat);
            }
        }

        // ===== СОБЫТИЯ =====
        document.getElementById('authBtn').onclick = () => {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const isLogin = document.getElementById('authTitle').innerText === 'Вход';
            
            if (isLogin) {
                if (login(username, password)) {
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    initApp();
                }
            } else {
                if (register(username, password)) {
                    document.getElementById('authTitle').innerText = 'Вход';
                    document.getElementById('authBtn').innerText = 'Войти';
                    document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
                }
            }
        };

        document.getElementById('authSwitch').onclick = () => {
            const isLogin = document.getElementById('authTitle').innerText === 'Вход';
            if (isLogin) {
                document.getElementById('authTitle').innerText = 'Регистрация';
                document.getElementById('authBtn').innerText = 'Зарегистрироваться';
                document.getElementById('authSwitch').innerHTML = 'Уже есть аккаунт? Войти';
            } else {
                document.getElementById('authTitle').innerText = 'Вход';
                document.getElementById('authBtn').innerText = 'Войти';
                document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
            }
        };

        document.getElementById('addFriendBtn').onclick = () => {
            const name = document.getElementById('friendName').value.trim();
            if (name) {
                addFriend(name);
                document.getElementById('friendName').value = '';
            }
        };

        document.getElementById('sendBtn').onclick = () => {
            if (currentChat) {
                const text = document.getElementById('messageInput').value;
                sendMessage(currentChat, text);
                document.getElementById('messageInput').value = '';
            }
        };

        document.getElementById('callBtn').onclick = () => {
            if (currentChat) {
                startCall(currentChat);
            }
        };

        document.getElementById('endCallBtn').onclick = () => {
            endCall();
        };

        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadContacts();
            };
        });

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });

        // Восстанавливаем сессию
        const savedUser = localStorage.getItem('twifflix_current');
        if (savedUser && users[savedUser]) {
            currentUser = savedUser;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initApp();
        }
    </script>
</body>
</html>
