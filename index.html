<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENSEC: Охрана банка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #111;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }
        #game {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 1920px;
            max-height: 1080px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        #interface {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(0,0,0,0.7);
        }
        #status {
            display: flex;
            gap: 20px;
        }
        .status-item {
            font-size: 14px;
        }
        #controls {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
        }
        #playground {
            flex: 1;
            position: relative;
            background: #222;
        }
        .object {
            position: absolute;
            cursor: pointer;
        }
        #desk {
            width: 400px;
            height: 200px;
            background: #533;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        #newspaper, #phone, #monitor, #button-police, #ammo-box {
            position: absolute;
        }
        #newspaper { bottom: 150px; left: 300px; width: 80px; height: 60px; background: #eee; color: #000; }
        #phone { bottom: 160px; left: 400px; width: 60px; height: 40px; background: #ccc; }
        #monitor { bottom: 170px; left: 500px; width: 100px; height: 80px; background: #000; border: 2px solid #33f; }
        #button-police { bottom: 180px; left: 620px; width: 50px; height: 30px; background: #f33; }
        #ammo-box { bottom: 150px; left: 100px; width: 70px; height: 50px; background: #666; }
        #door-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            background: #444;
            padding: 10px;
        }
        .door-btn {
            width: 60px;
            height: 40px;
            background: #555;
            margin: 5px 0;
            text-align: center;
            line-height: 40px;
            cursor: pointer;
        }
        .door-open { background: #4a4; }
        .door-closed { background: #a44; }
        .character {
            position: absolute;
            width: 40px;
            height: 60px;
        }
        .banker { background: #ddd; border: 1px solid #aaa; }
        .civilian { background: #888; border: 1px solid #666; }
        .bandit { background: #222; border: 1px solid #000; color: red; }
        .police { background: #aaf; border: 1px solid #88f; }
        #time-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
        }
        #ending {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            display: none;
        }
    </style>
</head>
<body>

            <div id="controls">

            </div>
        </div>
    </div>
