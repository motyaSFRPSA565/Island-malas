<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа Моти • 90-е аниме RPG</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a2b3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .game-wrapper {
            background: #0a1a2a;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 0 #04121e, 0 20px 30px rgba(0,0,0,0.6);
            border: 2px solid #7f8c9a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 900px;
            height: 600px;
            border-radius: 12px;
            box-shadow: inset 0 0 0 2px #7f8c9a, 0 0 0 3px #2c3e50;
            background: #2a3f54;
            image-rendering: pixelated;
        }
        .control-panel {
            margin-top: 16px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            background: #2e4155;
            padding: 12px 20px;
            border-radius: 60px;
            border: 2px solid #0f1c2a;
            box-shadow: inset 0 -2px 0 #0f1c2a;
        }
        .dpad {
            display: flex;
            gap: 6px;
        }
        .dpad button {
            background: #4a617c;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            box-shadow: 0 5px 0 #1e2f3f, 0 6px 10px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 2px solid #8098b0;
        }
        .dpad button:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #1e2f3f;
        }
        .action-btn {
            background: #f0c45a;
            border: none;
            font-size: 24px;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            box-shadow: 0 5px 0 #b87e2a, 0 6px 10px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 2px solid #ffe29c;
            color: #252017;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #b87e2a;
        }
        .status {
            background: #1f313f;
            padding: 10px 24px;
            border-radius: 40px;
            color: #b3dbff;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #4b6e88;
            box-shadow: inset 0 -2px 0 #0f1f2c;
        }
        .dialog-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 750px;
            background: #0e1c28;
            border: 4px solid #b1c9e8;
            border-radius: 24px;
            padding: 20px 30px;
            box-shadow: 0 10px 0 #030b12, 0 15px 30px black;
            color: #e9f2ff;
            font-size: 22px;
            font-family: 'Courier New', monospace;
            display: none;
            z-index: 10;
        }
        .speaker-name {
            color: #ffd966;
            font-size: 18px;
            margin-bottom: 5px;
            border-bottom: 2px solid #4a6990;
            display: inline-block;
            padding-right: 20px;
        }
        .dialog-text {
            min-height: 70px;
            margin: 15px 0;
            line-height: 1.4;
        }
        .dialog-options {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
        }
        .dialog-options button {
            background: #3a506b;
            border: 3px solid #7d9ec0;
            color: white;
            font-size: 22px;
            padding: 8px 25px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 5px 0 #1f2f3f;
            cursor: pointer;
        }
        .dialog-options button:active {
            transform: translateY(5px);
            box-shadow: none;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <!-- Диалоговое окно -->
    <div id="dialogOverlay" class="dialog-box">
        <div id="speakerName" class="speaker-name">Персонаж</div>
        <div id="dialogText" class="dialog-text">Текст диалога</div>
        <div class="dialog-options">
            <button id="choice1">Вариант 1</button>
            <button id="choice2">Вариант 2</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="dpad">
            <button id="btnLeft">←</button>
            <button id="btnRight">→</button>
        </div>
        <div class="status" id="statusText">3 этаж • коридор</div>
        <button class="action-btn" id="actionBtn">💬 говорить</button>
    </div>
</div>

<script>
(function() {
    // -------------------------------------------------
    // ТВОИ ТЕКСТУРЫ - ВСТАВЛЯЙ СЮДА СВОИ КАРТИНКИ
    // -------------------------------------------------
    const TEXTURES = {
        // Моя (нужны 3 кадра: стоячий, шаг левой, шаг правой)
        hero_idle: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAP0lEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxvw3FgMBMInUe0EAAAAASUVORK5CYII=',
        hero_walk1: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAP0lEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxvw3FgMBMInUe0EAAAAASUVORK5CYII=',
        hero_walk2: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAP0lEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxvw3FgMBMInUe0EAAAAASUVORK5CYII=',
        
        // Учитель
        teacher: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII=',
        
        // Одноклассница
        classmate: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII=',
        
        // Друг
        friend: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII=',
        
        // Дверь, окно, лестница
        door: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII=',
        stairs: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII=',
        window: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAARklEQVR4nO3asQ0AIAwDwQzM/z+LhQUSUliK4O5aN5muu1qStcSJMcYYY4wxxhhjjDHGGGOMMcYYY4wxxhhjjDHGGGOMMcY8k4UBe+6lDVMAAAAASUVORK5CYII='
    };

    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let motyaX = 10;  // позиция в мире
    let motyaFrame = 0;
    let motyaDirection = 0;
    let walkTimer = 0;
    
    const WORLD_WIDTH = 32;  // 32 клетки (больше для камеры)
    const CELL_SIZE = 64;
    
    // Центр камеры - Мотя всегда в центре экрана
    const CAMERA_OFFSET_X = 450;  // половина ширины экрана 900/2
    const CAMERA_OFFSET_Y = 300;  // половина высоты 600/2

    let dialogActive = false;
    let currentNPC = null;
    let nearbyNPC = null;

    // ---------- ПЕРСОНАЖИ ----------
    const npcs = [
        { 
            id: 'teacher1', 
            name: 'учитель', 
            type: 'teacher', 
            x: 4,
            depth: 'wall',
            yOffset: 20,
            dialog: {
                text: 'Мотя, когда будешь уроки делать?',
                options: ['Сегодня', 'Завтра'],
                responses: ['Ну смотри, не затягивай.', 'Лентяй...']
            }
        },
        { 
            id: 'classmate1', 
            name: 'одноклассница', 
            type: 'classmate', 
            x: 9,
            depth: 'center',
            yOffset: 40,
            dialog: {
                text: 'Привет! Как каникулы прошли?',
                options: ['Отлично!', 'Так себе'],
                responses: ['Круто, я тоже отдохнула!', 'Бывает... в школе увидимся']
            }
        },
        { 
            id: 'friend1', 
            name: 'друг Юки', 
            type: 'friend', 
            x: 16,
            depth: 'front',
            yOffset: 60,
            dialog: {
                text: 'Мотя! В новую игру рубились?',
                options: ['Ага', 'Не, не было времени'],
                responses: ['Я тебе дам поиграть!', 'Жалко, крутая игра']
            }
        },
        { 
            id: 'teacher2', 
            name: 'завуч', 
            type: 'teacher', 
            x: 22,
            depth: 'wall',
            yOffset: 20,
            dialog: {
                text: 'Опять по коридору бегаешь?',
                options: ['Я не бегал', 'Извините'],
                responses: ['Смотри мне...', 'Так-то лучше']
            }
        },
        { 
            id: 'classmate2', 
            name: 'Сакура', 
            type: 'classmate', 
            x: 27,
            depth: 'center',
            yOffset: 40,
            dialog: {
                text: 'Мотя, ты в кружок записался?',
                options: ['Да', 'Нет'],
                responses: ['Круто, увидимся там!', 'Приходи, весело!']
            }
        }
    ];

    // ---------- ОБЪЕКТЫ ----------
    const objects = [
        { type: 'door', x: 2, name: 'кабинет 210' },
        { type: 'door', x: 7, name: 'кабинет 211' },
        { type: 'stairs', x: 13, name: 'лестница' },
        { type: 'window', x: 18, name: 'окно' },
        { type: 'door', x: 24, name: 'кабинет 212' },
        { type: 'window', x: 29, name: 'окно' }
    ];

    // ---------- ЗАГРУЗКА ИЗОБРАЖЕНИЙ ----------
    const images = {};
    function loadImages() {
        for (let key in TEXTURES) {
            let img = new Image();
            img.src = TEXTURES[key];
            images[key] = img;
        }
    }
    loadImages();

    // ---------- ОТРИСОВКА С КАМЕРОЙ ----------
    function getScreenX(worldX) {
        return worldX * CELL_SIZE - (motyaX * CELL_SIZE - CAMERA_OFFSET_X);
    }

    function drawSprite(type, worldX, worldY, width = CELL_SIZE, height = CELL_SIZE) {
        let screenX = getScreenX(worldX);
        if (images[type]) {
            ctx.drawImage(images[type], screenX, worldY, width, height);
        } else {
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(screenX, worldY, width, height);
        }
    }

    function renderGame() {
        ctx.clearRect(0, 0, 900, 600);

        // --- СТЕНА (вся рисуется со смещением камеры) ---
        let startCol = Math.max(0, Math.floor((motyaX * CELL_SIZE - CAMERA_OFFSET_X) / CELL_SIZE) - 1);
        let endCol = Math.min(WORLD_WIDTH, Math.ceil((motyaX * CELL_SIZE + CAMERA_OFFSET_X) / CELL_SIZE) + 2);
        
        // Фон стены (сплошной)
        ctx.fillStyle = '#3a5f7a';
        ctx.fillRect(0, 0, 900, 380);
        
        // Текстура стены (рисуем для каждой видимой клетки)
        for (let col = startCol; col < endCol; col++) {
            let screenX = getScreenX(col);
            
            // Панели на стене
            ctx.strokeStyle = '#2c4055';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(screenX, 100 + i * 40);
                ctx.lineTo(screenX + CELL_SIZE, 100 + i * 40);
                ctx.strokeStyle = '#2c4055';
                ctx.stroke();
            }
        }

        // Линия горизонта
        ctx.fillStyle = '#6b4f3a';
        ctx.fillRect(0, 370, 900, 10);

        // Пол
        ctx.fillStyle = '#c9b27c';
        ctx.fillRect(0, 380, 900, 220);
        
        // Текстура пола
        ctx.strokeStyle = '#a58e62';
        ctx.lineWidth = 3;
        for (let i = 0; i < 8; i++) {
            ctx.beginPath();
            ctx.moveTo(0, 400 + i * 27);
            ctx.lineTo(900, 400 + i * 27);
            ctx.strokeStyle = '#a58e62';
            ctx.stroke();
        }

        // --- ПРЕДМЕТЫ НА СТЕНЕ ---
        objects.forEach(obj => {
            let screenX = getScreenX(obj.x);
            
            if (obj.type === 'door') {
                ctx.fillStyle = '#8b6e4c';
                ctx.fillRect(screenX, 190, 55, 180);
                ctx.fillStyle = '#c9b27c';
                ctx.fillRect(screenX + 15, 250, 25, 50);
                ctx.fillStyle = '#f0d090';
                ctx.fillRect(screenX + 40, 280, 8, 8);
            } 
            else if (obj.type === 'stairs') {
                ctx.fillStyle = '#8b7a5a';
                ctx.fillRect(screenX, 230, 55, 140);
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = '#6b5a3a';
                    ctx.fillRect(screenX + 8 + i*8, 240 + i*25, 6, 50);
                }
            } 
            else if (obj.type === 'window') {
                ctx.fillStyle = '#a5d0ff';
                ctx.fillRect(screenX + 5, 200, 50, 120);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(screenX + 25, 200, 6, 120);
                ctx.fillRect(screenX + 5, 260, 50, 6);
            }
        });

        // --- NPC ---
        npcs.forEach(npc => {
            let screenX = getScreenX(npc.x);
            let npcY = 280;
            
            let depthOffset = 0;
            if (npc.depth === 'wall') depthOffset = -20;
            else if (npc.depth === 'center') depthOffset = 20;
            else if (npc.depth === 'front') depthOffset = 50;
            
            if (npc.type === 'teacher') {
                drawSprite('teacher', npc.x, npcY - 40 + depthOffset, 64, 96);
            } else if (npc.type === 'classmate') {
                drawSprite('classmate', npc.x, npcY - 40 + depthOffset, 64, 96);
            } else if (npc.type === 'friend') {
                drawSprite('friend', npc.x, npcY - 40 + depthOffset, 64, 96);
            }
            
            ctx.font = 'bold 16px "Courier New"';
            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.strokeText(npc.name, screenX, npcY - 50 + depthOffset);
            ctx.fillText(npc.name, screenX, npcY - 50 + depthOffset);
        });

        // --- МОТЯ (всегда в центре экрана) ---
        let heroScreenX = CAMERA_OFFSET_X - 32;  // центрируем спрайт
        let heroY = 330;
        
        let heroSprite = 'hero_idle';
        if (motyaDirection === 1) {
            heroSprite = 'hero_walk1';
        } else if (motyaDirection === 2) {
            heroSprite = 'hero_walk2';
        }
        
        if (images[heroSprite]) {
            ctx.drawImage(images[heroSprite], heroScreenX, heroY - 40, 64, 96);
        } else {
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(heroScreenX, heroY - 40, 64, 96);
        }
        
        ctx.font = 'bold 18px "Courier New"';
        ctx.fillStyle = '#ffd966';
        ctx.strokeStyle = 'black';
        ctx.strokeText('Мотя', heroScreenX, heroY - 50);
        ctx.fillText('Мотя', heroScreenX, heroY - 50);

        // --- ПОДСВЕТКА NPC РЯДОМ (с учетом камеры) ---
        if (nearbyNPC && !dialogActive) {
            ctx.strokeStyle = '#ffd966';
            ctx.lineWidth = 5;
            ctx.setLineDash([10, 10]);
            
            let npc = nearbyNPC;
            let screenX = getScreenX(npc.x);
            let depthOffset = npc.depth === 'wall' ? -20 : (npc.depth === 'center' ? 20 : 50);
            
            ctx.strokeRect(screenX - 5, 230 + depthOffset, 74, 110);
            ctx.setLineDash([]);
        }

        // Статус
        let place = objects.find(o => o.x === motyaX);
        document.getElementById('statusText').innerText = place ? place.name : 'коридор 3 этажа';
    }

    // ---------- АНИМАЦИЯ ----------
    function updateWalkAnimation(direction) {
        if (direction !== 0) {
            motyaDirection = direction;
            walkTimer++;
            if (walkTimer > 5) {
                motyaFrame = (motyaFrame + 1) % 2;
                walkTimer = 0;
            }
        } else {
            motyaDirection = 0;
            motyaFrame = 0;
        }
    }

    // ---------- ДВИЖЕНИЕ ----------
    function move(dx) {
        if (dialogActive) return;
        let newX = motyaX + dx;
        if (newX >= 0 && newX < WORLD_WIDTH) {
            motyaX = newX;
            if (dx > 0) {
                updateWalkAnimation(2);
            } else {
                updateWalkAnimation(1);
            }
        }
        updateNearbyNPC();
    }

    function stopWalking() {
        updateWalkAnimation(0);
    }

    // ---------- ДИАЛОГИ ----------
    function talkTo(npc) {
        if (!npc) return;
        
        currentNPC = npc;
        dialogActive = true;
        
        document.getElementById('speakerName').innerText = npc.name;
        document.getElementById('dialogText').innerText = npc.dialog.text;
        document.getElementById('choice1').innerText = '▶ ' + npc.dialog.options[0];
        document.getElementById('choice2').innerText = '▶ ' + npc.dialog.options[1];
        
        document.getElementById('dialogOverlay').style.display = 'block';
    }

    function closeDialog() {
        dialogActive = false;
        currentNPC = null;
        document.getElementById('dialogOverlay').style.display = 'none';
    }

    document.getElementById('choice1').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[0];
            setTimeout(closeDialog, 1500);
        }
    });

    document.getElementById('choice2').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[1];
            setTimeout(closeDialog, 1500);
        }
    });

    function updateNearbyNPC() {
        nearbyNPC = npcs.find(npc => npc.x === motyaX) || null;
    }

    function interact() {
        if (dialogActive) {
            closeDialog();
            return;
        }
        if (nearbyNPC) {
            talkTo(nearbyNPC);
        } else {
            let obj = objects.find(o => o.x === motyaX);
            if (obj) {
                if (obj.type === 'door') alert('🚪 ' + obj.name);
                else if (obj.type === 'stairs') alert('🪜 лестница');
                else if (obj.type === 'window') alert('🪟 окно');
            }
        }
    }

    // ---------- УПРАВЛЕНИЕ ----------
    document.getElementById('btnLeft').addEventListener('mousedown', () => move(-1));
    document.getElementById('btnLeft').addEventListener('mouseup', stopWalking);
    document.getElementById('btnLeft').addEventListener('mouseleave', stopWalking);
    
    document.getElementById('btnRight').addEventListener('mousedown', () => move(1));
    document.getElementById('btnRight').addEventListener('mouseup', stopWalking);
    document.getElementById('btnRight').addEventListener('mouseleave', stopWalking);
    
    document.getElementById('actionBtn').addEventListener('click', interact);

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            move(-1);
        }
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            move(1);
        }
        if (e.key === ' ' || e.key === 'e') {
            e.preventDefault();
            interact();
        }
        if (e.key === 'Escape' && dialogActive) closeDialog();
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            stopWalking();
        }
    });

    // Анимационный цикл
    function gameLoop() {
        if (!dialogActive && motyaDirection !== 0) {
            walkTimer++;
            if (walkTimer > 5) {
                motyaFrame = (motyaFrame + 1) % 2;
                walkTimer = 0;
            }
        }
        renderGame();
        requestAnimationFrame(gameLoop);
    }

    // Старт
    window.onload = () => {
        updateNearbyNPC();
        gameLoop();
    };
})();
</script>
</body>
</html>
