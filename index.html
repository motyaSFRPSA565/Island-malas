<!DOCTYPE html>
<html>
<head>
    <title>SAN FIERRO: 1.6 FIXED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #333; font-family: monospace; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 20px; text-shadow: 2px 2px #000; pointer-events: none; }
        #cross { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid #0f0; transform: translate(-50%, -50%); }
        #btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: #008000; color: white; cursor: pointer; border: 3px solid white; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">HP: 100 | AMMO: 30/90 | $: 800</div>
<div id="cross"></div>
<button id="btn" onclick="start()">ВСТУПИТЬ В БОЙ (START)</button>

<script src="https://cdnjs.cloudflare.com"></script>

<script>
let scene, camera, renderer, player;
let keys = {};

function start() {
    document.getElementById('btn').style.display = 'none';
    document.body.requestPointerLock();
    
    // 1. Сцена
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x5588aa); // Голубое небо

    // 2. Камера
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 50); // Ставим камеру чуть выше моста

    // 3. Свет (Добавляем много, чтобы не было черным)
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // 4. Рендерер
    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 5. МОСТ
    // Полотно
    const bridgeGeo = new THREE.BoxGeometry(20, 2, 500);
    const bridgeMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
    const bridge = new THREE.Mesh(bridgeGeo, bridgeMat);
    scene.add(bridge);

    // Опоры (Точки для бомб)
    const pillarGeo = new THREE.BoxGeometry(10, 40, 10);
    const pillarMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    for(let z = -200; z <= 200; z += 200) {
        let p = new THREE.Mesh(pillarGeo, pillarMat);
        p.position.set(0, -20, z);
        scene.add(p);
    }

    // Вода (снизу)
    const water = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0x004466}));
    water.rotation.x = -Math.PI/2;
    water.position.y = -30;
    scene.add(water);

    // 6. БОТЫ (Красные кубы)
    for(let i = 0; i < 5; i++) {
        let bot = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshLambertMaterial({color: 0xff0000}));
        bot.position.set(Math.random()*10-5, 3, -50 - (i * 20));
        scene.add(bot);
    }

    animate();
}

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement) {
        camera.rotation.y -= e.movementX * 0.003;
    }
});

function animate() {
    requestAnimationFrame(animate);
    
    // Движение
    const speed = 0.4;
    if(keys['KeyW']) camera.translateZ(-speed);
    if(keys['KeyS']) camera.translateZ(speed);
    if(keys['KeyA']) camera.translateX(-speed);
    if(keys['KeyD']) camera.translateX(speed);
    
    camera.position.y = 5; // Не даем падать

    renderer.render(scene, camera);
}

console.log("ДРАГО: Я ДОЛЖЕН!");
</script>
</body>
</html>
