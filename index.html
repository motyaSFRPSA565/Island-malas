<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ОСТРОВ МАЛАСА: ПОБЕГ</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', monospace; color: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; border: 2px solid rgba(0,255,0,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        #menu, #game-over { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        button { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: #008000; color: #fff; border: 2px solid #fff; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #00ff00; color: #000; }
        .stat { margin-bottom: 5px; font-weight: bold; font-size: 1.1rem; }
        #noise-bar { width: 150px; height: 8px; border: 1px solid #fff; display: inline-block; vertical-align: middle; }
        #noise-fill { height: 100%; background: #ff0000; width: 0%; }
    </style>
</head>
<body>

<div id="ui">
    <div id="mission-label" class="stat">МИССИЯ: 1 - ПОБЕГ ИЗ ТЮРЬМЫ</div>
    <div id="hp-label" class="stat">ЗДОРОВЬЕ: 100%</div>
    <div id="ammo-label" class="stat" style="display:none">ПАТРОНЫ: 0</div>
    <div id="noise-ui" class="stat" style="display:none">ШУМ: <div id="noise-bar"><div id="noise-fill"></div></div></div>
    <div id="timer-label" class="stat" style="display:none">ТАЙМЕР: 03:00</div>
</div>

<div id="crosshair"></div>

<div id="menu">
    <h1>ОСТРОВ МАЛАСА</h1>
    <p style="max-width: 600px;">Вы проснулись в камере. Оружия нет. <br>Найдите выход (белый портал), чтобы продвинуться дальше.</p>
    <button onclick="startGame()">НАЧАТЬ ИГРУ</button>
    <p style="font-size: 0.8rem; margin-top: 20px;">W,A,S,D - Ходить | Shift - Присесть/Стелс | F - Фонарь | Клик - Огонь</p>
</div>

<div id="game-over" style="display:none">
    <h1 id="res-title">ВЫ ПОГИБЛИ</h1>
    <p id="res-desc"></p>
    <button onclick="location.reload()">ЗАНОВО</button>
</div>

<script>
/** ENGINE CORE **/
let scene, camera, renderer, clock, flashLight, moonLight;
let enemies = [], allies = [], objects = [];
let hp = 100, ammo = 0, hasWeapon = false, noise = 0, currentMission = 1;
let gameState = 'menu';
let missionTimer = 180;
const keys = {};

// Инициализация Three.js
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    scene.fog = new THREE.FogExp2(0x111111, 0.05);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // СВЕТ (Добавлено больше яркости)
    const ambient = new THREE.AmbientLight(0xffffff, 0.5); 
    scene.add(ambient);

    moonLight = new THREE.DirectionalLight(0xaaaaff, 0.3);
    moonLight.position.set(5, 10, 5);
    scene.add(moonLight);

    flashLight = new THREE.SpotLight(0xffffff, 5, 35, Math.PI/4, 0.5);
    flashLight.visible = false;
    scene.add(flashLight);
    scene.add(flashLight.target);

    loadMission(currentMission);

    window.addEventListener('keydown', e => { 
        keys[e.code] = true;
        if(e.code === 'KeyF') flashLight.visible = !flashLight.visible;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', () => { if(hasWeapon && gameState === 'playing') fire(); });
    
    animate();
}

/** MISSIONS **/
function loadMission(n) {
    // Чистка
    enemies.forEach(e => scene.remove(e.mesh));
    objects.forEach(o => scene.remove(o));
    allies.forEach(a => scene.remove(a.mesh));
    enemies = []; objects = []; allies = [];

    // Пол
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(200,200), new THREE.MeshPhongMaterial({color: 0x222222}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // Выход (Портал)
    const portal = new THREE.Mesh(new THREE.BoxGeometry(2,4,2), new THREE.MeshBasicMaterial({color: 0xffffff}));
    portal.position.set(0, 2, -45);
    portal.name = "EXIT";
    scene.add(portal);
    objects.push(portal);

    if(n == 1) { // Тюрьма
        spawnAlly(3, 0, -5, "Медведь");
        createWall(0, 0, -10, 20, 5);
        document.getElementById('mission-label').innerText = "МИССИЯ 1: ТЮРЬМА (Дойдите до белого портала)";
    } 
    else if(n == 2) { // Подземелье
        document.getElementById('noise-ui').style.display = 'block';
        spawnEnemy(0, 0, -20, 'cloaker');
        document.getElementById('mission-label').innerText = "МИССИЯ 2: ПОДЗЕМЕЛЬЕ (Используйте Shift)";
    }
    else if(n == 3) { // Лагерь
        hasWeapon = true; ammo = 32;
        document.getElementById('ammo-label').style.display = 'block';
        document.getElementById('ammo-label').innerText = "ПАТРОНЫ: 32";
        spawnEnemy(10, 0, -20, 'bulldozer');
        spawnEnemy(-10, 0, -30, 'bulldozer');
        document.getElementById('mission-label').innerText = "МИССИЯ 3: ЛАГЕРЬ (Бой)";
    }
    else if(n == 4) { // Доки
        document.getElementById('timer-label').style.display = 'block';
        spawnEnemy(0, 0, -35, 'giga');
        document.getElementById('mission-label').innerText = "МИССИЯ 4: ДОКИ (Босс)";
    }
}

/** ENTITIES **/
function spawnEnemy(x, z, type) {
    const group = new THREE.Group();
    let color = (type === 'cloaker') ? 0x000000 : (type === 'giga' ? 0xffd700 : 0x556b2f);
    let scale = (type === 'giga') ? 2 : 1;

    const body = new THREE.Mesh(new THREE.BoxGeometry(1*scale, 2*scale, 1*scale), new THREE.MeshPhongMaterial({color}));
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.6*scale, 0.6*scale, 0.6*scale), new THREE.MeshPhongMaterial({color: 0xff0000}));
    head.position.y = 1.3 * scale;
    group.add(body, head);
    group.position.set(x, 1 * scale, z);
    scene.add(group);
    enemies.push({ mesh: group, hp: type==='giga'?500:100, type });
}

function spawnAlly(x, y, z) {
    const bear = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshPhongMaterial({color: 0x8b4513}));
    bear.position.set(x, 1, z);
    scene.add(bear);
    allies.push({ mesh: bear });
}

function createWall(x, y, z, w, h) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, 2), new THREE.MeshPhongMaterial({color: 0x333333}));
    wall.position.set(x, h/2, z);
    scene.add(wall);
    objects.push(wall);
}

/** GAMEPLAY **/
function fire() {
    if(ammo <= 0) return;
    ammo--;
    document.getElementById('ammo-label').innerText = "ПАТРОНЫ: " + ammo;

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);
    raycaster.setFromCamera(center, camera);
    
    const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh), true);
    if(intersects.length > 0) {
        let hitMesh = intersects[0].object;
        while(hitMesh.parent && !hitMesh.parent.isScene) hitMesh = hitMesh.parent;
        const target = enemies.find(e => e.mesh === hitMesh);
        if(target) {
            target.hp -= 40;
            if(target.hp <= 0) {
                scene.remove(target.mesh);
                enemies = enemies.filter(e => e !== target);
            }
        }
    }
}

function update(delta) {
    if(gameState !== 'playing') return;

    // Movement
    const speed = (keys['ShiftLeft'] ? 2.5 : 6) * delta;
    const oldPos = camera.position.clone();
    
    if(keys['KeyW']) camera.translateZ(-speed);
    if(keys['KeyS']) camera.translateZ(speed);
    if(keys['KeyA']) camera.translateX(-speed);
    if(keys['KeyD']) camera.translateX(speed);
    camera.position.y = (keys['ShiftLeft'] ? 1.0 : 1.8);

    // Noise Logic
    if(currentMission == 2) {
        if(!keys['ShiftLeft'] && (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'])) {
            noise = Math.min(100, noise + 40 * delta);
        } else {
            noise = Math.max(0, noise - 20 * delta);
        }
        document.getElementById('noise-fill').style.width = noise + '%';
        if(noise > 90) hp -= 10 * delta;
    }

    // Flashlight Direction
    flashLight.position.copy(camera.position);
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    flashLight.target.position.copy(camera.position).add(dir);

    // Enemy AI
    enemies.forEach(en => {
        const dist = en.mesh.position.distanceTo(camera.position);
        if(dist < 15) {
            en.mesh.lookAt(camera.position.x, en.mesh.position.y, camera.position.z);
            en.mesh.translateZ( (en.type === 'cloaker' ? 5 : 2) * delta );
            if(dist < 2) hp -= 20 * delta;
        }
    });

    // Check Portal Collision
    if(camera.position.distanceTo(new THREE.Vector3(0, 0, -45)) < 3) {
        nextLevel();
    }

    // Timer (Mission 4)
    if(currentMission == 4) {
        missionTimer -= delta;
        const m = Math.floor(missionTimer/60);
        const s = Math.floor(missionTimer%60);
        document.getElementById('timer-label').innerText = `ТАЙМЕР: 0${m}:${s<10?'0'+s:s}`;
        if(missionTimer <= 0) finishGame("СМЕРТЬ", "Вы не успели до отплытия корабля!");
    }

    // HP Update
    document.getElementById('hp-label').innerText = `ЗДОРОВЬЕ: ${Math.max(0, Math.floor(hp))}%`;
    if(hp <= 0) finishGame("СМЕРТЬ", "Вас поймали стражи острова Маласа.");
}

function nextLevel() {
    if(currentMission < 4) {
        currentMission++;
        camera.position.set(0, 1.8, 0);
        loadMission(currentMission);
    } else {
        finishGame("ЛЕГЕНДА", "Вы убили Гига-Бульдозера и угнали лодку!");
    }
}

function finishGame(title, desc) {
    gameState = 'over';
    document.exitPointerLock();
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('res-title').innerText = title;
    document.getElementById('res-desc').innerText = desc;
}

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    update(delta);
    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    gameState = 'playing';
    init();
    document.body.requestPointerLock();
}

// Pointer Lock
document.addEventListener('mousemove', (e) => {
    if(document.pointerLockElement === document.body && gameState === 'playing') {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x = Math.max(-Math.PI/3, Math.min(Math.PI/3, camera.rotation.x - e.movementY * 0.002));
    }
});
</script>
</body>
</html>
