<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа Моти • 90-е аниме RPG</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0f1a24;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            background-image: radial-gradient(circle at 20% 30%, #1e3a4a 0%, #0a141f 100%);
        }
        .game-container {
            position: relative;
            padding: 20px;
            background: linear-gradient(145deg, #122b38 0%, #07121c 100%);
            border-radius: 32px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(100,180,255,0.2);
            border: 2px solid #4f7b9e;
        }
        canvas {
            display: block;
            width: 1000px;
            height: 600px;
            border-radius: 20px;
            box-shadow: inset 0 0 0 3px #6d8fb0, 0 0 0 4px #2a4055, 0 20px 30px black;
            background: #1a3243;
            image-rendering: pixelated;
        }
        .control-panel {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #1e384b 0%, #10212f 100%);
            padding: 15px 25px;
            border-radius: 80px;
            border: 2px solid #4a789c;
            box-shadow: inset 0 -3px 0 #0b1a26, 0 10px 20px rgba(0,0,0,0.5);
        }
        .dpad {
            display: flex;
            gap: 8px;
        }
        .dpad button {
            background: linear-gradient(145deg, #3d5e7e 0%, #1f3950 100%);
            border: none;
            color: #ddf0ff;
            font-size: 32px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            border-radius: 30px;
            box-shadow: 0 6px 0 #0f202f, 0 8px 15px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 2px solid #7fa6c9;
            text-shadow: 2px 2px 0 #0a1925;
            transition: 0.03s linear;
        }
        .dpad button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f202f;
        }
        .action-btn {
            background: linear-gradient(145deg, #e8b55a 0%, #c58a2f 100%);
            border: none;
            font-size: 28px;
            padding: 15px 40px;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: 0 6px 0 #8b5f23, 0 8px 15px black;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border: 3px solid #ffe6a3;
            color: #221d12;
            text-shadow: 1px 1px 0 #ffdd99;
            letter-spacing: 2px;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #8b5f23;
        }
        .status {
            background: linear-gradient(145deg, #1d3343 0%, #0f202f 100%);
            padding: 12px 30px;
            border-radius: 50px;
            color: #c1e2ff;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid #5588aa;
            box-shadow: inset 0 -2px 0 #0a1925, inset 0 2px 5px #3c6688;
            text-shadow: 2px 2px 0 #0a1a2a;
        }
        .dialog-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 850px;
            background: linear-gradient(165deg, #0f2335 0%, #1a3349 100%);
            border: 4px solid #9bc2e8;
            border-radius: 40px;
            padding: 25px 35px;
            box-shadow: 0 15px 0 #05121e, 0 25px 40px black, inset 0 0 30px #3d6a9f;
            color: #edf6ff;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            display: none;
            z-index: 10;
            backdrop-filter: blur(2px);
        }
        .speaker-name {
            color: #ffdb8e;
            font-size: 20px;
            margin-bottom: 8px;
            border-bottom: 3px solid #5d8fc0;
            display: inline-block;
            padding-right: 30px;
            text-shadow: 2px 2px 0 #2a4058;
            letter-spacing: 1px;
        }
        .dialog-text {
            min-height: 80px;
            margin: 15px 0;
            line-height: 1.5;
            text-shadow: 3px 3px 0 #0e1f30;
            color: #eef7ff;
        }
        .dialog-options {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 20px;
        }
        .dialog-options button {
            background: linear-gradient(145deg, #2d4b6b 0%, #1b3147 100%);
            border: 3px solid #89b6e3;
            color: white;
            font-size: 26px;
            padding: 12px 35px;
            border-radius: 70px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            box-shadow: 0 6px 0 #112433, 0 8px 15px black;
            cursor: pointer;
            transition: 0.03s;
            text-shadow: 2px 2px 0 #0f263a;
        }
        .dialog-options button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #112433;
        }
        .hint {
            color: #9bc2e8;
            font-size: 16px;
            text-shadow: 1px 1px 0 #0b1c2b;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

    <!-- Диалоговое окно -->
    <div id="dialogOverlay" class="dialog-box">
        <div id="speakerName" class="speaker-name">Персонаж</div>
        <div id="dialogText" class="dialog-text">Текст диалога</div>
        <div class="dialog-options">
            <button id="choice1">Вариант 1</button>
            <button id="choice2">Вариант 2</button>
        </div>
    </div>

    <div class="control-panel">
        <div class="dpad">
            <button id="btnLeft">←</button>
            <button id="btnRight">→</button>
        </div>
        <div class="status" id="statusText">3 этаж • коридор</div>
        <button class="action-btn" id="actionBtn">💬 говорить</button>
    </div>
    <div style="display: flex; justify-content: space-between; margin-top: 12px; padding: 0 10px;">
        <span class="hint">←→ ходить | 💬 говорить</span>
        <span class="hint">✨ персонажи поворачиваются</span>
    </div>
</div>

<script>
(function() {
    // ----------------------------------------------------------------
    // ТВОИ ТЕКСТУРЫ — СЮДА ВСТАВЛЯЙ СВОИ РИСУНКИ
    // ----------------------------------------------------------------
    const TEXTURES = {
        // Мотя (с поворотом)
        motya_idle_right: '',    // стоит лицом вправо
        motya_idle_left: '',     // стоит лицом влево
        motya_walk_right1: '',   // шаг правой (вправо)
        motya_walk_right2: '',   // шаг левой (вправо)
        motya_walk_left1: '',    // шаг левой (влево)
        motya_walk_left2: '',    // шаг правой (влево)
        
        // Персонажи (примеры, заменишь на свои)
        teacher: '',
        classmate: '',
        friend: '',
        
        // Окружение (можно заменить)
        door: '',
        window: '',
        stairs: ''
    };

    // ---------- ТЕСТОВЫЕ ПЕРСОНАЖИ (чтобы не пропадали) ----------
    // ТЫ ПОТОМ ЗАМЕНИШЬ НА СВОИХ
    const npcs = [
        { 
            id: 'teacher1', 
            name: 'учитель', 
            texture: 'teacher', 
            x: 8,
            depth: 'wall',  // у стены
            dialog: {
                text: 'Мотя, когда будешь уроки делать?',
                options: ['Сегодня', 'Завтра'],
                responses: ['Ну смотри, не затягивай.', 'Лентяй...']
            }
        },
        { 
            id: 'classmate1', 
            name: 'одноклассница', 
            texture: 'classmate', 
            x: 15,
            depth: 'center',  // посередине
            dialog: {
                text: 'Привет! Как каникулы прошли?',
                options: ['Отлично!', 'Так себе'],
                responses: ['Круто, я тоже отдохнула!', 'Бывает... в школе увидимся']
            }
        },
        { 
            id: 'friend1', 
            name: 'друг Юки', 
            texture: 'friend', 
            x: 22,
            depth: 'front',  // ближе к игроку
            dialog: {
                text: 'Мотя! В новую игру рубились?',
                options: ['Ага', 'Не, не было времени'],
                responses: ['Я тебе дам поиграть!', 'Жалко, крутая игра']
            }
        },
        { 
            id: 'teacher2', 
            name: 'завуч', 
            texture: 'teacher', 
            x: 30,
            depth: 'wall',
            dialog: {
                text: 'Опять по коридору бегаешь?',
                options: ['Я не бегал', 'Извините'],
                responses: ['Смотри мне...', 'Так-то лучше']
            }
        }
    ];

    // ---------- ОБЪЕКТЫ ----------
    const objects = [
        { type: 'door', x: 4, name: 'кабинет 210' },
        { type: 'door', x: 11, name: 'кабинет 211' },
        { type: 'window', x: 18, name: 'окно' },
        { type: 'stairs', x: 25, name: 'лестница' },
        { type: 'door', x: 32, name: 'кабинет 212' }
    ];

    // ---------- НАСТРОЙКИ ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    let motyaX = 15;
    let motyaDirection = 'right';  // 'right' или 'left'
    let motyaWalkState = 0;  // 0 - idle, 1 - шаг1, 2 - шаг2
    let walkTimer = 0;
    let isMoving = false;
    
    const WORLD_WIDTH = 40;
    const CELL_SIZE = 64;  // ширина клетки
    
    const CAMERA_OFFSET_X = 500;

    let dialogActive = false;
    let currentNPC = null;
    let nearbyNPC = null;

    // ---------- ЗАГРУЗКА ИЗОБРАЖЕНИЙ ----------
    const images = {};
    function loadImages() {
        for (let key in TEXTURES) {
            if (TEXTURES[key]) {
                let img = new Image();
                img.src = TEXTURES[key];
                images[key] = img;
            }
        }
    }
    loadImages();

    // ---------- КАМЕРА ----------
    function getScreenX(worldX) {
        return worldX * CELL_SIZE - (motyaX * CELL_SIZE - CAMERA_OFFSET_X);
    }

    // ---------- ОТРИСОВКА ----------
    function renderGame() {
        ctx.clearRect(0, 0, 1000, 600);

        // --- СТЕНА ---
        // Основной цвет стены
        ctx.fillStyle = '#3a5f7a';
        ctx.fillRect(0, 0, 1000, 350);
        
        // Панели на стене
        ctx.fillStyle = '#2d4c6e';
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(0, 70 + i * 60, 1000, 20);
        }
        
        // Верхний свет
        ctx.fillStyle = '#4f7b9e';
        ctx.fillRect(0, 0, 1000, 30);
        
        // Линия плинтуса
        ctx.fillStyle = '#5d4a35';
        ctx.fillRect(0, 340, 1000, 10);
        ctx.fillStyle = '#7b6242';
        ctx.fillRect(0, 345, 1000, 5);

        // --- ПОЛ ---
        ctx.fillStyle = '#bd9f6e';
        ctx.fillRect(0, 350, 1000, 250);
        
        // Доски пола
        ctx.strokeStyle = '#9f8357';
        ctx.lineWidth = 3;
        for (let i = 0; i < 10; i++) {
            let y = 380 + i * 25;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(1000, y);
            ctx.stroke();
        }
        
        // Тени на полу
        ctx.fillStyle = '#00000020';
        ctx.fillRect(0, 350, 1000, 10);

        // --- ОБЪЕКТЫ (ДВЕРИ, ОКНА) ---
        objects.forEach(obj => {
            let screenX = getScreenX(obj.x);
            if (screenX > -100 && screenX < 1100) {
                
                if (obj.type === 'door') {
                    // Дверь (нормальной ширины)
                    ctx.fillStyle = '#8b6e4c';
                    ctx.fillRect(screenX, 190, 64, 160);  // ширина 64 как клетка
                    
                    // Ручка
                    ctx.fillStyle = '#f0d090';
                    ctx.fillRect(screenX + 50, 270, 8, 8);
                    
                    // Окошко в двери
                    ctx.fillStyle = '#c0d8f0';
                    ctx.fillRect(screenX + 15, 230, 30, 30);
                }
                else if (obj.type === 'window') {
                    // Окно
                    ctx.fillStyle = '#a5d0ff';
                    ctx.fillRect(screenX + 5, 200, 54, 120);
                    
                    // Перекладины
                    ctx.fillStyle = '#2c3e50';
                    ctx.fillRect(screenX + 28, 200, 8, 120);
                    ctx.fillRect(screenX + 5, 260, 54, 8);
                }
                else if (obj.type === 'stairs') {
                    // Лестница
                    ctx.fillStyle = '#8b7a5a';
                    ctx.fillRect(screenX, 240, 64, 120);
                    
                    for (let i = 0; i < 4; i++) {
                        ctx.fillStyle = '#6b5a3a';
                        ctx.fillRect(screenX + 8 + i*12, 250 + i*25, 8, 40);
                    }
                }
            }
        });

        // --- NPC (ТЕПЕРЬ ОНИ ЕСТЬ) ---
        npcs.forEach(npc => {
            let screenX = getScreenX(npc.x);
            if (screenX > -100 && screenX < 1100) {
                
                // Смещение по глубине
                let depthOffset = 0;
                if (npc.depth === 'wall') depthOffset = -10;
                else if (npc.depth === 'center') depthOffset = 15;
                else if (npc.depth === 'front') depthOffset = 35;
                
                let npcY = 280 + depthOffset;  // Стоят на полу
                
                // Если есть текстура - рисуем, если нет - заглушку
                if (images[npc.texture]) {
                    ctx.drawImage(images[npc.texture], screenX, npcY - 40, 64, 96);
                } else {
                    // Заглушка чтобы было видно
                    ctx.fillStyle = '#6b8cff';
                    ctx.fillRect(screenX + 10, npcY - 30, 44, 70);
                    ctx.fillStyle = '#f0d5b0';
                    ctx.fillRect(screenX + 20, npcY - 40, 24, 24);
                }
                
                // Имя
                ctx.font = 'bold 16px "Courier New"';
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 3;
                ctx.strokeText(npc.name, screenX, npcY - 50);
                ctx.fillText(npc.name, screenX, npcY - 50);
            }
        });

        // --- МОТЯ (БОЛЬШОЙ, С ПОВОРОТОМ) ---
        let heroScreenX = CAMERA_OFFSET_X - 32;  // центрируем
        let heroY = 310;  // Стоит на полу
        
        // Выбираем текстуру в зависимости от направления и анимации
        let motyaTexture = '';
        if (!isMoving) {
            // Стоит
            motyaTexture = motyaDirection === 'right' ? 'motya_idle_right' : 'motya_idle_left';
        } else {
            // Идёт
            if (motyaDirection === 'right') {
                motyaTexture = motyaWalkState === 1 ? 'motya_walk_right1' : 'motya_walk_right2';
            } else {
                motyaTexture = motyaWalkState === 1 ? 'motya_walk_left1' : 'motya_walk_left2';
            }
        }
        
        // Рисуем Мотю
        if (images[motyaTexture]) {
            ctx.drawImage(images[motyaTexture], heroScreenX, heroY - 40, 64, 96);
        } else {
            // Заглушка (чтобы было видно)
            ctx.fillStyle = '#d97706';
            ctx.fillRect(heroScreenX + 12, heroY - 30, 40, 70);
            ctx.fillStyle = '#f0d5b0';
            ctx.fillRect(heroScreenX + 22, heroY - 40, 20, 20);
            
            // Глаза в зависимости от направления
            ctx.fillStyle = 'black';
            if (motyaDirection === 'right') {
                ctx.fillRect(heroScreenX + 32, heroY - 34, 4, 4);
                ctx.fillRect(heroScreenX + 44, heroY - 34, 4, 4);
            } else {
                ctx.fillRect(heroScreenX + 22, heroY - 34, 4, 4);
                ctx.fillRect(heroScreenX + 34, heroY - 34, 4, 4);
            }
        }
        
        // Имя Моти
        ctx.font = 'bold 20px "Courier New"';
        ctx.fillStyle = '#ffd966';
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 4;
        ctx.strokeText('Мотя', heroScreenX, heroY - 50);
        ctx.fillText('Мотя', heroScreenX, heroY - 50);

        // Подсветка NPC рядом
        if (nearbyNPC && !dialogActive) {
            ctx.strokeStyle = '#ffd966';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 8]);
            
            let npc = nearbyNPC;
            let screenX = getScreenX(npc.x);
            let depthOffset = 0;
            if (npc.depth === 'wall') depthOffset = -10;
            else if (npc.depth === 'center') depthOffset = 15;
            else if (npc.depth === 'front') depthOffset = 35;
            
            ctx.strokeRect(screenX - 5, 230 + depthOffset, 74, 110);
            ctx.setLineDash([]);
        }

        // Статус
        let place = objects.find(o => o.x === motyaX);
        document.getElementById('statusText').innerText = place ? place.name : 'коридор 3 этажа';
    }

    // ---------- АНИМАЦИЯ ХОДЬБЫ ----------
    function updateWalkAnimation(direction) {
        isMoving = true;
        motyaDirection = direction;
        walkTimer++;
        if (walkTimer > 6) {
            motyaWalkState = motyaWalkState === 1 ? 2 : 1;
            walkTimer = 0;
        }
    }

    function stopWalking() {
        isMoving = false;
        motyaWalkState = 0;
        walkTimer = 0;
    }

    // ---------- ДВИЖЕНИЕ ----------
    function move(dx) {
        if (dialogActive) return;
        let newX = motyaX + dx;
        if (newX >= 0 && newX < WORLD_WIDTH) {
            motyaX = newX;
            if (dx > 0) {
                updateWalkAnimation('right');
            } else {
                updateWalkAnimation('left');
            }
        }
        updateNearbyNPC();
    }

    // ---------- ДИАЛОГИ ----------
    function talkTo(npc) {
        if (!npc) return;
        
        currentNPC = npc;
        dialogActive = true;
        
        document.getElementById('speakerName').innerText = npc.name;
        document.getElementById('dialogText').innerText = npc.dialog.text;
        document.getElementById('choice1').innerText = '▶ ' + npc.dialog.options[0];
        document.getElementById('choice2').innerText = '▶ ' + npc.dialog.options[1];
        
        document.getElementById('dialogOverlay').style.display = 'block';
    }

    function closeDialog() {
        dialogActive = false;
        currentNPC = null;
        document.getElementById('dialogOverlay').style.display = 'none';
    }

    document.getElementById('choice1').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[0];
            setTimeout(closeDialog, 1500);
        }
    });

    document.getElementById('choice2').addEventListener('click', () => {
        if (currentNPC) {
            document.getElementById('speakerName').innerText = currentNPC.name;
            document.getElementById('dialogText').innerText = currentNPC.dialog.responses[1];
            setTimeout(closeDialog, 1500);
        }
    });

    function updateNearbyNPC() {
        nearbyNPC = npcs.find(npc => npc.x === motyaX) || null;
    }

    function interact() {
        if (dialogActive) {
            closeDialog();
            return;
        }
        if (nearbyNPC) {
            talkTo(nearbyNPC);
        } else {
            let obj = objects.find(o => o.x === motyaX);
            if (obj) {
                if (obj.type === 'door') alert('🚪 ' + obj.name);
                else if (obj.type === 'stairs') alert('🪜 лестница');
                else if (obj.type === 'window') alert('🪟 окно');
            }
        }
    }

    // ---------- УПРАВЛЕНИЕ ----------
    document.getElementById('btnLeft').addEventListener('mousedown', () => move(-1));
    document.getElementById('btnLeft').addEventListener('mouseup', stopWalking);
    document.getElementById('btnLeft').addEventListener('mouseleave', stopWalking);
    
    document.getElementById('btnRight').addEventListener('mousedown', () => move(1));
    document.getElementById('btnRight').addEventListener('mouseup', stopWalking);
    document.getElementById('btnRight').addEventListener('mouseleave', stopWalking);
    
    document.getElementById('actionBtn').addEventListener('click', interact);

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            move(-1);
        }
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            move(1);
        }
        if (e.key === ' ' || e.key === 'e') {
            e.preventDefault();
            interact();
        }
        if (e.key === 'Escape' && dialogActive) closeDialog();
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            stopWalking();
        }
    });

    // Анимационный цикл
    function gameLoop() {
        if (!dialogActive && isMoving) {
            walkTimer++;
            if (walkTimer > 6) {
                motyaWalkState = motyaWalkState === 1 ? 2 : 1;
                walkTimer = 0;
            }
        }
        renderGame();
        requestAnimationFrame(gameLoop);
    }

    // Старт
    window.onload = () => {
        updateNearbyNPC();
        gameLoop();
    };
})();
</script>
</body>
</html>
