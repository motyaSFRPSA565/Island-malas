<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TWIFLIX MAX — пиксельный мессенджер</title>
    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- Font Awesome 6 (пиксельные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            font-family: 'Courier New', 'VT323', monospace;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* пиксельный контейнер */
        .pixel-container {
            max-width: 1400px;
            width: 100%;
            background: #1a1a2e;
            border: 4px solid #ff3333;
            box-shadow: 8px 8px 0 #5a1e1e;
            position: relative;
            overflow: hidden;
        }

        /* хедер */
        .pixel-header {
            background: #0f0f1a;
            padding: 12px 16px;
            border-bottom: 3px solid #ff3333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ff3333;
            text-shadow: 2px 2px 0 #4a0000;
        }

        .user-info {
            background: #00000066;
            padding: 5px 12px;
            border: 1px solid #ff3333;
            font-size: 14px;
            color: #ffccaa;
        }

        .pixel-btn {
            background: #2a2a3a;
            border: 2px solid #ff3333;
            color: #ffddbb;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 2px 2px 0 #5a1e1e;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* основной layout */
        .app-layout {
            display: flex;
            flex-direction: row;
            height: 70vh;
            min-height: 500px;
        }

        /* боковая панель (друзья + чаты) */
        .sidebar {
            width: 280px;
            background: #11111f;
            border-right: 3px solid #ff3333;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 12px;
            border-bottom: 1px solid #ff333355;
        }

        .section-title {
            color: #ff6666;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .friend-list, .chat-list {
            list-style: none;
        }

        .friend-item, .chat-item {
            background: #1e1e2c;
            margin: 6px 0;
            padding: 6px 10px;
            border-left: 4px solid #ff3333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .friend-item.online {
            border-left-color: #33ff33;
            background: #1e2a1e;
        }

        .chat-active {
            background: #ff333322;
        }

        /* центральный чат */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #12121c;
        }

        .chat-header {
            background: #0b0b12;
            padding: 10px 16px;
            border-bottom: 2px solid #ff3333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 8px 12px;
            background: #22223b;
            border: 1px solid #ff3333;
            color: #f0f0f0;
            font-size: 14px;
            word-break: break-word;
        }

        .my-message {
            align-self: flex-end;
            background: #3a1a2a;
            border-color: #ff7777;
        }

        .input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: #0f0f17;
            border-top: 2px solid #ff3333;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            background: #000000aa;
            border: 2px solid #ff3333;
            padding: 10px;
            color: white;
            font-size: 14px;
        }

        /* звонковый модальный */
        .call-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000dd;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .call-window {
            background: #1a1a2e;
            border: 4px solid #ff3333;
            width: 300px;
            text-align: center;
            padding: 20px;
        }
        .video-container video {
            width: 100%;
            background: black;
            margin: 8px 0;
        }
        .hidden {
            display: none;
        }
        .bear-mascot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 48px;
            cursor: pointer;
            filter: drop-shadow(2px 2px 0 #ff3333);
            z-index: 99;
        }
        @media (max-width: 700px) {
            .app-layout { flex-direction: column; height: auto; }
            .sidebar { width: 100%; max-height: 200px; flex-direction: row; overflow-x: auto; }
            .sidebar-section { min-width: 200px; }
        }
    </style>
</head>
<body>
<div class="pixel-container" id="appRoot">
    <div class="pixel-header">
        <div class="logo">📼 TWIFLIX MAX █</div>
        <div id="authStatusPanel" style="display: flex; gap: 10px; align-items: center;"></div>
    </div>
    <div id="mainAppContent" style="display: none;">
        <div class="app-layout">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="section-title"><i class="fas fa-user-friends"></i> ДРУЗЬЯ (онлайн)</div>
                    <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                        <input type="text" id="friendAddInput" placeholder="имя пользователя" style="background:#000;border:1px solid red;color:white;">
                        <button class="pixel-btn" id="addFriendBtn">+ добавить</button>
                    </div>
                    <ul id="friendsListUI" class="friend-list"></ul>
                </div>
                <div class="sidebar-section">
                    <div class="section-title"><i class="fas fa-comments"></i> ЧАТЫ</div>
                    <button class="pixel-btn" id="createGroupBtn" style="width:100%; margin-bottom:8px;">+ СОЗДАТЬ ГРУППУ</button>
                    <ul id="chatsListUI" class="chat-list"></ul>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <span id="currentChatName">💬 выберите чат</span>
                    <button class="pixel-btn" id="callBtn" style="background:#4a0000;"><i class="fas fa-phone-alt"></i> ЗВОНОК</button>
                </div>
                <div id="chatMessagesContainer" class="chat-messages"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="сообщение... стикер :dog: или фото ссылкой [img]url[/img]">
                    <button class="pixel-btn" id="sendMsgBtn">📨 ОТПРАВИТЬ</button>
                    <button class="pixel-btn" id="emojiBtn">😀</button>
                </div>
            </div>
        </div>
    </div>
    <div id="authScreen" style="padding: 30px; text-align: center;">
        <div class="logo" style="margin-bottom: 24px;">⚡ TWIFLIX MAX ⚡</div>
        <div id="authTabs">
            <button class="pixel-btn" id="showLoginTab">ВХОД</button>
            <button class="pixel-btn" id="showRegisterTab">РЕГИСТРАЦИЯ</button>
        </div>
        <div id="loginForm" style="margin-top: 20px;">
            <input type="text" id="loginUsername" placeholder="имя пользователя" style="display:block; margin:10px auto; padding:8px; width:200px;"><br>
            <input type="password" id="loginPassword" placeholder="пароль" style="display:block; margin:10px auto; padding:8px; width:200px;"><br>
            <button class="pixel-btn" id="doLoginBtn">ВОЙТИ</button>
        </div>
        <div id="registerForm" style="margin-top: 20px; display:none;">
            <input type="text" id="regUsername" placeholder="уникальное имя" style="display:block; margin:10px auto; padding:8px; width:200px;"><br>
            <input type="password" id="regPassword" placeholder="пароль" style="display:block; margin:10px auto; padding:8px; width:200px;"><br>
            <div><label>аватар: </label><input type="color" id="avatarColor" value="#ff3333"> <span>или эмодзи</span> <input id="avatarEmoji" placeholder="🐱" maxlength="2" style="width:50px;"></div>
            <button class="pixel-btn" id="doRegisterBtn" style="margin-top:12px;">СОЗДАТЬ АККАУНТ</button>
        </div>
        <div id="authError" style="color:#ff8888; margin-top:12px;"></div>
    </div>
</div>
<div class="bear-mascot" id="bearMascot">🧸🍵</div>
<div id="callOverlay" class="call-modal hidden">
    <div class="call-window">
        <h3>📞 ВЫЗОВ</h3>
        <div id="localVideoContainer"></div>
        <div id="remoteVideoContainer"></div>
        <button class="pixel-btn" id="hangupBtn">ПОЛОЖИТЬ ТРУБКУ</button>
    </div>
</div>

<script>
    // ----------  КОНФИГИ ----------
    const TELEGRAM_BOT_TOKEN = "8655630023:AAHx11sDOmY7JemehAcaLfEyP907qRgzOKM";
    const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;
    let CURRENT_USER = null;      // {username, password, avatar, online: true}
    let ACTIVE_CHAT = null;       // { id, type, name, participants[] }
    let FRIENDS = [];              // [{username, avatar, online}]
    let CHATS = [];               // личные чаты и групповые
    let onlineUsers = new Set();   // имена онлайн
    
    let peer = null;
    let currentCall = null;
    let localStream = null;

    // ----------  ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ TELEGRAM (каждый чат = группа/канал) ----------
    async function tgSendMessage(chatId, text, replyMarkup=null) {
        try {
            let url = `${TELEGRAM_API}/sendMessage`;
            let body = { chat_id: chatId, text: text, parse_mode: "HTML" };
            if(replyMarkup) body.reply_markup = replyMarkup;
            let res = await fetch(url, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
            return await res.json();
        } catch(e){ console.warn(e); }
    }
    async function tgGetUpdates(offset=0) { // для хранения сообщений (просто сохраняем историю)
        // В данной реализации вся история хранится локально, но бот сохраняет сообщения в своих группах
        // Используем бота для долговременного хранения: при отправке сообщения шлем в канал чата
        // Идея: каждый чат имеет свой уникальный идентификатор (например "chat_"+chatId), создаем супергруппу или канал
        // упрощённо: будем использовать форвард, но для демо используем API для отправки и получения последних 50 сообщений в группу
        // Для надежности мы сохраняем историю в localStorage + синхронизируем через бота
    }
    async function ensureChatGroup(chatIdentifier) {
        // Создаём чат в телеграме если не существует (для хранения истории)
        // Но т.к. создание групп через бота требует прав, используем просто отправку сообщений в существующий суперчат.
        // В демо: все сообщения также пишутся в локальный массив + бот хранит в канале по id "tw_chat_"+chatIdentifier
        // Для упрощения: при отправке сообщения шлем POST запрос к боту, и он сохранит.
        let groupId = `tw_chat_${chatIdentifier}`;
        return groupId;
    }
    async function sendMessageToBotHistory(chatId, sender, text, timestamp) {
        let groupName = `chat_hist_${chatId}`;
        let messageText = `[${timestamp}] ${sender}: ${text}`;
        await tgSendMessage(groupName, messageText);
    }
    
    // ----------  ЛОКАЛЬНОЕ ХРАНЕНИЕ + РЕЗЕРВ TELEGRAM ----------
    function saveUserData() {
        if(CURRENT_USER){
            let allUsers = JSON.parse(localStorage.getItem("tw_users") || "{}");
            allUsers[CURRENT_USER.username] = { password: CURRENT_USER.password, avatar: CURRENT_USER.avatar };
            localStorage.setItem("tw_users", JSON.stringify(allUsers));
            localStorage.setItem("tw_current_user", CURRENT_USER.username);
            // резерв в телеграм (отправляем сообщение боту)
            tgSendMessage("tw_backup", `USER:${CURRENT_USER.username} DATA:${JSON.stringify({avatar:CURRENT_USER.avatar})}`);
        }
        if(CURRENT_USER){
            let friendsDB = JSON.parse(localStorage.getItem(`tw_friends_${CURRENT_USER.username}`) || "[]");
            FRIENDS = friendsDB;
            let chatsDB = JSON.parse(localStorage.getItem(`tw_chats_${CURRENT_USER.username}`) || "[]");
            CHATS = chatsDB;
        }
    }
    function loadUserData(username){
        let friendsDB = JSON.parse(localStorage.getItem(`tw_friends_${username}`) || "[]");
        FRIENDS = friendsDB;
        let chatsDB = JSON.parse(localStorage.getItem(`tw_chats_${username}`) || "[]");
        CHATS = chatsDB;
        updateOnlineStatus();
    }
    function persistAll(){
        if(CURRENT_USER){
            localStorage.setItem(`tw_friends_${CURRENT_USER.username}`, JSON.stringify(FRIENDS));
            localStorage.setItem(`tw_chats_${CURRENT_USER.username}`, JSON.stringify(CHATS));
        }
    }
    
    // обновление статуса онлайн (кто зашел)
    function updateOnlineStatus(){
        if(!CURRENT_USER) return;
        let allOnline = JSON.parse(localStorage.getItem("tw_online_users") || "{}");
        allOnline[CURRENT_USER.username] = true;
        localStorage.setItem("tw_online_users", JSON.stringify(allOnline));
        // проверяем друзей
        for(let f of FRIENDS){
            f.online = !!allOnline[f.username];
        }
        renderFriendsList();
        // слушаем других через интервал (эмуляция realtime)
    }
    function refreshOnlineUsers(){
        let allOnline = JSON.parse(localStorage.getItem("tw_online_users") || "{}");
        for(let f of FRIENDS){
            f.online = !!allOnline[f.username];
        }
        renderFriendsList();
        renderChatsList();
    }
    setInterval(()=>{
        if(CURRENT_USER){
            updateOnlineStatus(); // обновляем свой онлайн
            refreshOnlineUsers();
            // каждые 2 сек обновление сообщений (имитация realtime)
            if(ACTIVE_CHAT) loadMessagesForChat(ACTIVE_CHAT);
        }
    }, 2000);
    
    // сообщения по чатам
    let messagesCache = {};
    function getMessages(chatId){
        if(!messagesCache[chatId]) messagesCache[chatId]=[];
        return messagesCache[chatId];
    }
    function addMessage(chatId, msg){
        let arr = getMessages(chatId);
        arr.push(msg);
        messagesCache[chatId]=arr;
        if(ACTIVE_CHAT && ACTIVE_CHAT.id===chatId) renderMessages();
        // пасхалка "Драго" 
        if(msg.sender.toLowerCase().includes("драго") || (msg.text && msg.text.toLowerCase().includes("драго"))){
            setTimeout(()=>{
                let last = getMessages(chatId);
                last.push({sender:"🐉 ДРАГО", text:"Я должен!", timestamp:Date.now(), system:true});
                if(ACTIVE_CHAT && ACTIVE_CHAT.id===chatId) renderMessages();
            },100);
        }
        persistMessage(chatId,msg);
    }
    function persistMessage(chatId,msg){
        let store = JSON.parse(localStorage.getItem(`msgs_${chatId}_${CURRENT_USER?.username}`) || "[]");
        store.push(msg);
        localStorage.setItem(`msgs_${chatId}_${CURRENT_USER?.username}`, JSON.stringify(store));
        // через бот резерв
        sendMessageToBotHistory(chatId, msg.sender, msg.text, msg.timestamp);
    }
    function loadMessagesForChat(chat){
        if(!chat) return;
        let store = JSON.parse(localStorage.getItem(`msgs_${chat.id}_${CURRENT_USER?.username}`) || "[]");
        messagesCache[chat.id] = store;
        renderMessages();
    }
    
    function sendMessageToChat(text){
        if(!ACTIVE_CHAT || !text.trim()) return;
        let msg = { sender: CURRENT_USER.username, text: text, timestamp: Date.now() };
        addMessage(ACTIVE_CHAT.id, msg);
        // если личный чат с другом и группа
    }
    
    // UI рендеры
    function renderFriendsList(){
        let container = document.getElementById("friendsListUI");
        if(!container) return;
        container.innerHTML = FRIENDS.map(f=>`<li class="friend-item ${f.online?'online':''}" data-user="${f.username}">${f.avatar||'👤'} ${f.username} ${f.online?'🟢':'⚫'}</li>`).join("");
        document.querySelectorAll(".friend-item").forEach(el=>{
            el.addEventListener("click",()=>{
                let uname = el.dataset.user;
                openPrivateChat(uname);
            });
        });
    }
    function renderChatsList(){
        let container = document.getElementById("chatsListUI");
        if(!container) return;
        container.innerHTML = CHATS.map(ch=>`<li class="chat-item ${ACTIVE_CHAT?.id===ch.id?'chat-active':''}" data-chatid="${ch.id}">${ch.type==='group'?'👥':'💬'} ${ch.name}</li>`).join("");
        document.querySelectorAll(".chat-item").forEach(el=>{
            el.addEventListener("click",()=>{
                let cid = el.dataset.chatid;
                let chat = CHATS.find(c=>c.id==cid);
                if(chat) setActiveChat(chat);
            });
        });
    }
    function setActiveChat(chat){
        ACTIVE_CHAT = chat;
        document.getElementById("currentChatName").innerText = chat.name;
        loadMessagesForChat(chat);
        renderChatsList();
    }
    function openPrivateChat(username){
        let existing = CHATS.find(c=>c.type==='private' && c.participants.includes(username) && c.participants.includes(CURRENT_USER.username));
        if(existing){
            setActiveChat(existing);
        } else {
            let newChat = { id: `priv_${Date.now()}`, type:"private", name: username, participants: [CURRENT_USER.username, username] };
            CHATS.push(newChat);
            persistAll();
            setActiveChat(newChat);
        }
    }
    function createGroup(){
        let name = prompt("Название группы (до 10 чел):");
        if(!name) return;
        let newGroup = { id: `grp_${Date.now()}`, type:"group", name: name, participants: [CURRENT_USER.username] };
        CHATS.push(newGroup);
        persistAll();
        renderChatsList();
    }
    function addFriendByUsername(username){
        if(username===CURRENT_USER.username) return alert("Нельзя добавить себя");
        let exists = FRIENDS.find(f=>f.username===username);
        if(exists) return alert("Уже в друзьях");
        let usersDb = JSON.parse(localStorage.getItem("tw_users")||"{}");
        if(!usersDb[username]) return alert("Пользователь не найден");
        let avatar = usersDb[username].avatar || "🧸";
        FRIENDS.push({username, avatar, online:false});
        persistAll();
        renderFriendsList();
    }
    
    function renderMessages(){
        let container = document.getElementById("chatMessagesContainer");
        if(!container || !ACTIVE_CHAT) return;
        let msgs = getMessages(ACTIVE_CHAT.id);
        container.innerHTML = msgs.map(m=>`<div class="message-bubble ${m.sender===CURRENT_USER.username?'my-message':''}"><b>${m.sender}</b> ${m.text} <span style="font-size:10px;">${new Date(m.timestamp).toLocaleTimeString()}</span></div>`).join("");
        container.scrollTop = container.scrollHeight;
    }
    
    // WebRTC звонки
    async function initPeer(){
        peer = new Peer(CURRENT_USER.username+Date.now());
        peer.on('call', async call=>{
            if(confirm(`Входящий звонок от ${call.peer}?`)){
                localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
                call.answer(localStream);
                currentCall = call;
                document.getElementById("callOverlay").classList.remove("hidden");
                call.on('stream', remoteStream=>{
                    // аудио
                    let audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                });
            } else {
                call.close();
            }
        });
    }
    async function startCall(targetUsername){
        if(!peer) await initPeer();
        let friendPeerId = `${targetUsername}${Date.now()}`; // упрощенно
        localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
        let call = peer.call(friendPeerId, localStream);
        currentCall = call;
        document.getElementById("callOverlay").classList.remove("hidden");
        call.on('stream', remoteStream=>{
            let audio = new Audio();
            audio.srcObject = remoteStream;
            audio.play();
        });
    }
    function endCall(){
        if(currentCall) currentCall.close();
        if(localStream) localStream.getTracks().forEach(t=>t.stop());
        document.getElementById("callOverlay").classList.add("hidden");
        currentCall = null;
    }
    
    // Аутентификация
    function register(username, password, avatarData){
        let users = JSON.parse(localStorage.getItem("tw_users")||"{}");
        if(users[username]) return "Имя занято";
        let avatar = avatarData.color ? `<span style="background:${avatarData.color};padding:4px;">⬤</span>` : (avatarData.emoji || "🐱");
        users[username] = { password, avatar };
        localStorage.setItem("tw_users", JSON.stringify(users));
        CURRENT_USER = { username, password, avatar };
        localStorage.setItem("tw_current_user", username);
        FRIENDS = [];
        CHATS = [];
        persistAll();
        return "ok";
    }
    function login(username, password){
        let users = JSON.parse(localStorage.getItem("tw_users")||"{}");
        if(!users[username] || users[username].password !== password) return "Неверные данные";
        CURRENT_USER = { username, password, avatar: users[username].avatar };
        localStorage.setItem("tw_current_user", username);
        loadUserData(username);
        return "ok";
    }
    function logout(){
        let allOnline = JSON.parse(localStorage.getItem("tw_online_users")||"{}");
        delete allOnline[CURRENT_USER?.username];
        localStorage.setItem("tw_online_users", JSON.stringify(allOnline));
        CURRENT_USER=null;
        location.reload();
    }
    
    // инициализация UI
    window.onload = ()=>{
        let saved = localStorage.getItem("tw_current_user");
        if(saved){
            let users = JSON.parse(localStorage.getItem("tw_users")||"{}");
            if(users[saved]){
                CURRENT_USER = { username:saved, password:users[saved].password, avatar:users[saved].avatar };
                loadUserData(saved);
                document.getElementById("authScreen").style.display="none";
                document.getElementById("mainAppContent").style.display="block";
                updateOnlineStatus();
                initPeer();
                renderFriendsList();
                renderChatsList();
                setInterval(()=>refreshOnlineUsers(),3000);
            }
        }
        document.getElementById("showLoginTab").onclick=()=>{ document.getElementById("loginForm").style.display="block"; document.getElementById("registerForm").style.display="none"; };
        document.getElementById("showRegisterTab").onclick=()=>{ document.getElementById("loginForm").style.display="none"; document.getElementById("registerForm").style.display="block"; };
        document.getElementById("doLoginBtn").onclick=()=>{
            let un = document.getElementById("loginUsername").value;
            let pw = document.getElementById("loginPassword").value;
            let res = login(un,pw);
            if(res==="ok") location.reload();
            else document.getElementById("authError").innerText=res;
        };
        document.getElementById("doRegisterBtn").onclick=()=>{
            let un = document.getElementById("regUsername").value;
            let pw = document.getElementById("regPassword").value;
            let color = document.getElementById("avatarColor").value;
            let emoji = document.getElementById("avatarEmoji").value;
            let avatar = emoji?{emoji}:{color};
            let res = register(un,pw,avatar);
            if(res==="ok") location.reload();
            else document.getElementById("authError").innerText=res;
        };
        document.getElementById("sendMsgBtn").onclick=()=>{
            let inp = document.getElementById("messageInput");
            let txt = inp.value;
            if(txt.startsWith("[img]") && txt.endsWith("[/img]")){
                let url = txt.slice(5,-6);
                txt = `📷 ФОТО: ${url}`;
            }
            sendMessageToChat(txt);
            inp.value="";
        };
        document.getElementById("createGroupBtn").onclick=createGroup;
        document.getElementById("addFriendBtn").onclick=()=>{
            let name = document.getElementById("friendAddInput").value;
            addFriendByUsername(name);
        };
        document.getElementById("callBtn").onclick=()=>{
            if(ACTIVE_CHAT && ACTIVE_CHAT.type==='private'){
                let friendName = ACTIVE_CHAT.participants.find(p=>p!==CURRENT_USER.username);
                if(friendName) startCall(friendName);
                else alert("Не удалось определить друга");
            } else alert("Звонки только в личных чатах");
        };
        document.getElementById("hangupBtn").onclick=endCall;
        document.getElementById("emojiBtn").onclick=()=>{
            let em = prompt("вставьте эмодзи или стикер:","😎");
            if(em) document.getElementById("messageInput").value+=em;
        };
        // пасхалка медведь
        let bear = document.getElementById("bearMascot");
        bear.onclick=()=>alert("🧸 Чай будешь? 🍵");
        // код 67 (клавиша 'C')
        window.addEventListener("keydown",(e)=>{
            if(e.keyCode===67){
                alert("СЕКРЕТНАЯ ТЕМА: ПИКСЕЛЬНЫЙ КОТ ВАС ПРИВЕТСТВУЕТ! 🐱‍👤");
            }
        });
        if(!saved){
            document.getElementById("authScreen").style.display="block";
            document.getElementById("mainAppContent").style.display="none";
        }
    };
</script>
</body>
</html>
