<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SAN FIERRO: BRIDGE - TEAM SELECT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
                display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        .btn { padding: 20px 40px; margin: 10px; font-size: 24px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .swat-btn { background: #1e3a8a; color: white; }
        .payday-btn { background: #4b5563; color: white; }
        .btn:hover { transform: scale(1.1); opacity: 0.8; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; pointer-events: none; display: none; text-shadow: 2px 2px 2px black; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #0f0; transform: translate(-50%, -50%); display: none; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>SAN FIERRO: МОСТ</h1>
        <p>Выберите сторону конфликта:</p>
        <button class="btn swat-btn" onclick="startGame('SWAT')">ВСТУПИТЬ В SWAT (Синие)</button>
        <button class="btn payday-btn" onclick="startGame('PAYDAY')">ВСТУПИТЬ В PAYDAY (Серые)</button>
    </div>

    <div id="ui">
        <h2 id="team-name">КОМАНДА: ---</h2>
        <p>ЦЕЛЬ: Уничтожьте вражеский отряд!</p>
        <p id="msg" style="font-weight: bold; font-size: 1.2em;"></p>
    </div>
    <div id="crosshair"></div>
    <div id="flash"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let playerTeam = '';
        const enemies = [];
        const allies = [];
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        // --- ГЕНЕРАЦИЯ ПЕРСОНАЖА ---
        function createSoldier(team) {
            const group = new THREE.Group();
            const isSwat = team === 'SWAT';
            const color = isSwat ? 0x1e3a8a : 0x333333; // Синий vs Серый
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.4), new THREE.MeshLambertMaterial({color: color}));
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshLambertMaterial({color: 0x222222}));
            head.position.y = 0.8;
            
            // Маска или шлем
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.05), new THREE.MeshPhongMaterial({color: isSwat ? 0x00ccff : 0xffffff}));
            visor.position.set(0, 0.85, 0.2);
            
            group.add(body, head, visor);
            group.userData.team = team;
            return group;
        }

        function createM4() {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.5), mat);
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.25), mat);
            body.position.z = 0.2;
            group.add(barrel, body);
            return group;
        }

        // --- ИНИЦИАЛИЗАЦИЯ МИРА ---
        function initWorld() {
            scene.background = new THREE.Color(0x87ceeb);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun, new THREE.AmbientLight(0x606060));

            // Мост
            const bridge = new THREE.Mesh(new THREE.BoxGeometry(15, 2, 800), new THREE.MeshLambertMaterial({color: 0x444444}));
            scene.add(bridge);

            // Оружие игрока
            const gun = createM4();
            camera.add(gun);
            gun.position.set(0.3, -0.25, -0.4);
            scene.add(camera);
        }

        // --- ЗАПУСК ИГРЫ ---
        window.startGame = function(team) {
            playerTeam = team;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('team-name').innerText = "КОМАНДА: " + team;
            
            initWorld();
            spawnTeams();
            animate();
        }

        function spawnTeams() {
            const enemyTeam = playerTeam === 'SWAT' ? 'PAYDAY' : 'SWAT';
            
            // Спавним 5 союзников (ботов)
            for(let i = 0; i < 5; i++) {
                const ally = createSoldier(playerTeam);
                ally.position.set(Math.random()*6 - 3, 1.5, -20 - (i*5));
                scene.add(ally);
                allies.push(ally);
            }

            // Спавним 6 врагов (ботов)
            for(let i = 0; i < 6; i++) {
                const enemy = createSoldier(enemyTeam);
                enemy.position.set(Math.random()*10 - 5, 1.5, 40 + (i*8));
                scene.add(enemy);
                enemies.push(enemy);
            }

            // Позиция игрока
            camera.position.set(0, 2, -10);
        }

        // --- МЕХАНИКА СТРЕЛЬБЫ ---
        const raycaster = new THREE.Raycaster();
        window.onclick = () => {
            if(document.pointerLockElement) {
                shoot();
            } else {
                document.body.requestPointerLock();
            }
        };

        function shoot() {
            document.getElementById('flash').style.opacity = "1";
            setTimeout(() => document.getElementById('flash').style.opacity = "0", 30);

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if(intersects.length > 0) {
                let obj = intersects[0].object;
                while(obj.parent && !obj.userData.team) obj = obj.parent;

                if(obj.userData.team) {
                    if(obj.userData.team === playerTeam) {
                        msg("ОГОНЬ ПО СВОИМ!", "red");
                    } else {
                        scene.remove(obj);
                        const idx = enemies.indexOf(obj);
                        if(idx > -1) enemies.splice(idx, 1);
                        msg("ВРАГ УБИТ!", "#00ff00");
                    }
                }
            }
        }

        function msg(text, color) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.style.color = color;
        }

        // --- ДВИЖЕНИЕ ---
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.15;
            if(keys['KeyW']) camera.translateZ(-speed);
            if(keys['KeyS']) camera.translateZ(speed);
            if(keys['KeyA']) camera.translateX(-speed);
            if(keys['KeyD']) camera.translateX(speed);
            camera.position.y = 2.2;

            renderer.render(scene, camera);
        }

        window.onmousemove = (e) => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.order = 'YXZ';
            }
        };
    </script>
</body>
    </html>
