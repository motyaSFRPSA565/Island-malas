<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS 1.6: Мост Сан-Фиерро</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #0a3d0a; touch-action: pan-x pan-y; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ffcc00;
            text-shadow: 2px 2px 0 #000;
            z-index: 100;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid #8b4513;
            pointer-events: none;
        }
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 200;
            padding: 10px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(5px);
            border-top: 3px solid #8b4513;
            border-bottom: 3px solid #8b4513;
            pointer-events: none;
        }
        .ctrl-btn {
            background: #3a6b3a;
            border: 2px solid #c0a86a;
            color: white;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 18px;
            box-shadow: 0 4px 0 #1e3a1e;
            text-transform: uppercase;
            pointer-events: auto;
            touch-action: manipulation;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.1s;
            min-width: 70px;
            text-align: center;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        #weapon-panel {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 150;
            pointer-events: none;
        }
        .weapon-slot {
            background: rgba(30, 30, 30, 0.9);
            border: 3px solid #b8860b;
            border-radius: 15px;
            padding: 8px 18px;
            color: #fff;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 2px 2px 0 #000;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 -3px 0 #5a3e0b;
            pointer-events: auto;
            touch-action: manipulation;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .weapon-slot.active {
            background: #b8860b;
            color: #000;
            border-color: #ffd700;
            box-shadow: 0 0 20px gold;
        }
        #camera-feed {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 180px;
            height: 135px;
            background: #1e3a1e;
            border: 4px solid #6b8e23;
            border-radius: 10px;
            box-shadow: 0 0 0 2px #000;
            z-index: 300;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: 12px;
            color: lime;
            padding: 5px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            background: rgba(0,30,0,0.8);
            pointer-events: none;
        }
        #camera-feed div {
            background: rgba(0,0,0,0.7);
            margin: 2px;
            padding: 4px;
            border: 1px solid #6b8e23;
            text-align: center;
        }
        #joystick-area {
            position: absolute;
            bottom: 180px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(50,50,50,0.5);
            border-radius: 60px;
            border: 3px solid #8b4513;
            z-index: 250;
            backdrop-filter: blur(5px);
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        #look-area {
            position: absolute;
            bottom: 180px;
            right: 30px;
            width: 120px;
            height: 120px;
            background: rgba(50,50,50,0.5);
            border-radius: 60px;
            border: 3px solid #8b4513;
            z-index: 250;
            backdrop-filter: blur(5px);
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        #chat {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border: 2px solid #8b4513;
            font-size: 14px;
            z-index: 400;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div id="info">🚁 SAN FIERRO BRIDGE | T: МИНИРУЙТЕ | CT: РАЗМИНИРУЙТЕ | КАМЕРЫ: 3</div>
    <div id="camera-feed">
        <div>📹 КАМЕРА МОСТА -1: [ ЧИСТО ]</div>
        <div>📹 КАМЕРА МОСТА -2: [ ЧИСТО ]</div>
        <div>📹 КАМЕРА ЛЕС: [ ТЕРРОРИСТЫ ]</div>
    </div>
    <div id="chat">🎮 Выберите команду: Нажмите 1 (CT) или 2 (T)</div>
    
    <div id="weapon-panel">
        <div class="weapon-slot active" id="weap1">🔫 M4A1</div>
        <div class="weapon-slot" id="weap2">💣 C4 (только Т)</div>
        <div class="weapon-slot" id="weap3">📻 Рация</div>
    </div>

    <div id="controls-panel">
        <div class="ctrl-btn" id="btn-w">⬆️</div>
        <div class="ctrl-btn" id="btn-s">⬇️</div>
        <div class="ctrl-btn" id="btn-a">⬅️</div>
        <div class="ctrl-btn" id="btn-d">➡️</div>
        <div class="ctrl-btn" id="btn-shoot">🔥</div>
        <div class="ctrl-btn" id="btn-jump">🦘</div>
        <div class="ctrl-btn" id="btn-cam">📷</div>
    </div>

    <div id="joystick-area">🕹️ MOVE</div>
    <div id="look-area">👁️ LOOK</div>

    <!-- Подключение Three.js и библиотек -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- Инициализация сцены, камеры, рендера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Небо
        scene.fog = new THREE.Fog(0x87CEEB, 30, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10); // Вид от первого лица

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 30;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 50;
        scene.add(dirLight);
        
        // Дополнительный свет
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-5, 5, 10);
        scene.add(backLight);

        // --- Генерация текстур леса кодом (пиксельный стиль PD) ---
        function createPixelTexture(color1, color2, size=64) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = color2;
            // Пиксельный паттерн
            for (let i = 0; i < size; i+=8) {
                for (let j = 0; j < size; j+=8) {
                    if ((i+j) % 16 === 0) {
                        ctx.fillRect(i, j, 4, 4);
                    }
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(4, 4);
            return texture;
        }

        // Создаем лесную местность
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ map: createPixelTexture('#2a5a2a', '#3d6b3d') });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Деревья (простые цилиндры и сферы в стиле PD)
        function addTree(x, z) {
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 3), trunkMat);
            trunk.position.set(x, 1.5, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);
            
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            for (let i = 0; i < 3; i++) {
                const leaf = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.5, 8), leafMat);
                leaf.position.set(x, 3 + i*1.2, z);
                leaf.castShadow = true;
                leaf.receiveShadow = true;
                scene.add(leaf);
            }
        }
        for (let i = 0; i < 50; i++) {
            addTree(Math.sin(i)*15 + (i%7)*8 - 30, Math.cos(i)*15 + (i%5)*10 - 20);
        }

        // --- Мост Сан-Фиерро (знаменитый мост из GTA) ---
        const bridgeGroup = new THREE.Group();
        // Дорожное полотно
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a });
        const road = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 40), roadMat);
        road.position.set(0, 1, 0);
        road.castShadow = true;
        road.receiveShadow = true;
        bridgeGroup.add(road);
        
        // Разделительная полоса
        const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 40), stripeMat);
        stripe.position.set(0, 1.25, 0);
        bridgeGroup.add(stripe);
        
        // Перила
        const railMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        for (let i = -1; i <= 1; i+=2) {
            const railSide = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 40), railMat);
            railSide.position.set(i*4.5, 1.5, 0);
            railSide.castShadow = true;
            railSide.receiveShadow = true;
            bridgeGroup.add(railSide);
            
            // Столбики
            for (let j = -18; j <= 18; j+=5) {
                const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.5), railMat);
                pillar.position.set(i*4.5, 2.2, j);
                pillar.castShadow = true;
                bridgeGroup.add(pillar);
            }
        }
        
        // Опоры
        const suppMat = new THREE.MeshStandardMaterial({ color: 0x6b4c3b });
        for (let k = -15; k <= 15; k+=10) {
            const support = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), suppMat);
            support.position.set(0, -1.5, k);
            support.castShadow = true;
            support.receiveShadow = true;
            bridgeGroup.add(support);
        }
        
        bridgeGroup.position.y = 0.5;
        scene.add(bridgeGroup);

        // --- Модельки персонажей (в стиле PD, низкополигональные) ---
        // Террористы (зеленые)
        function createTerrorist(x, z, isBomber = false) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3c7a3c });
            const headMat = new THREE.MeshStandardMaterial({ color: 0xf0d0b0 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 1.8), bodyMat);
            body.position.y = 0.9;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), headMat);
            head.position.y = 1.9;
            head.castShadow = true;
            group.add(head);
            
            // Рюкзак с бомбой у минера
            if (isBomber) {
                const bomb = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                bomb.position.set(0, 1.2, -0.5);
                bomb.castShadow = true;
                group.add(bomb);
            } else {
                // Автомат за спиной
                const rifle = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                rifle.position.set(0.3, 1.1, -0.3);
                rifle.rotation.x = 0.5;
                rifle.castShadow = true;
                group.add(rifle);
            }
            
            group.position.set(x, 0, z);
            return group;
        }

        // Спецназ SWAT (тяжелый, черный)
        function createSWAT(x, z) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const vestMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const headMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 1.8), bodyMat);
            body.position.y = 0.9;
            body.castShadow = true;
            group.add(body);
            
            const vest = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.0, 0.5), vestMat);
            vest.position.set(0, 1.2, 0.3);
            vest.castShadow = true;
            group.add(vest);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45), headMat);
            head.position.y = 1.9;
            head.castShadow = true;
            group.add(head);
            
            // Шлем
            const helmet = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            helmet.position.y = 2.1;
            helmet.castShadow = true;
            group.add(helmet);
            
            // Щит
            const shield = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x2a4b7c }));
            shield.position.set(0, 1.0, 0.8);
            shield.castShadow = true;
            group.add(shield);
            
            group.position.set(x, 0, z);
            return group;
        }

        // Расставляем персонажей
        const terrorists = [];
        terrorists.push(createTerrorist(-5, 5, true));  // минер
        terrorists.push(createTerrorist(-7, 8));
        terrorists.push(createTerrorist(-3, 10));
        terrorists.forEach(t => scene.add(t));

        const swats = [];
        swats.push(createSWAT(5, -5));
        swats.push(createSWAT(7, -2));
        swats.push(createSWAT(3, -8));
        swats.forEach(s => scene.add(s));

        // Блэкхавк (вертолет) для десанта
        function createBlackhawk() {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a2b3c });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), bodyMat);
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);
            
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 2), bodyMat);
            tail.position.set(1.5, 0.5, 0);
            tail.castShadow = true;
            group.add(tail);
            
            const rotor = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 3), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            rotor.position.set(0, 1.2, 0);
            group.add(rotor);
            
            group.position.set(20, 15, -30);
            return group;
        }
        const blackhawk = createBlackhawk();
        scene.add(blackhawk);

        // Оружие в руках (для вида от первого лица)
        const weaponGroup = new THREE.Group();
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const gunBarrel = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.2), gunMat);
        gunBarrel.position.set(0.3, -0.2, -0.8);
        weaponGroup.add(gunBarrel);
        const gunHandle = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), gunMat);
        gunHandle.position.set(0.3, -0.1, -0.3);
        weaponGroup.add(gunHandle);
        weaponGroup.position.set(0.6, -0.3, -0.5);
        camera.add(weaponGroup);
        scene.add(camera);

        // Рация (отдельно)
        const radioGroup = new THREE.Group();
        const radioBody = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0xaa5533 }));
        radioBody.position.set(0.5, -0.2, -0.7);
        radioGroup.add(radioBody);
        const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
        antenna.position.set(0.6, 0.0, -0.8);
        radioGroup.add(antenna);
        radioGroup.visible = false;
        camera.add(radioGroup);

        // Камеры наблюдения (3 штуки на мосту)
        const camPositions = [ [-2, 4, -10], [2, 4, 0], [-1, 4, 15] ];
        const cameras = [];
        camPositions.forEach((pos, i) => {
            const camGeo = new THREE.SphereGeometry(0.3);
            const camMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const camObj = new THREE.Mesh(camGeo, camMat);
            camObj.position.set(pos[0], pos[1], pos[2]);
            scene.add(camObj);
            
            const lensGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2);
            const lensMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
            const lens = new THREE.Mesh(lensGeo, lensMat);
            lens.rotation.x = Math.PI/2;
            lens.position.set(pos[0], pos[1], pos[2] + 0.3);
            scene.add(lens);
            
            cameras.push({ pos: new THREE.Vector3(pos[0], pos[1], pos[2]), index: i });
        });

        // --- Логика игры и управление ---
        let team = 'CT'; // CT или T
        let currentWeapon = 0; // 0-M4, 1-C4, 2-рация
        let moveDirection = new THREE.Vector3();
        const velocity = new THREE.Vector3();
        let canJump = true;
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        
        // События клавиатуры (для теста на ПК + моб. кнопки)
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = true; e.preventDefault(); break;
                case 'KeyA': keys.a = true; e.preventDefault(); break;
                case 'KeyS': keys.s = true; e.preventDefault(); break;
                case 'KeyD': keys.d = true; e.preventDefault(); break;
                case 'Space': if (canJump) { velocity.y = 8; canJump = false; } e.preventDefault(); break;
                case 'Digit1': setWeapon(0); break;
                case 'Digit2': setWeapon(1); break;
                case 'Digit3': setWeapon(2); break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keys.w = false; break;
                case 'KeyA': keys.a = false; break;
                case 'KeyS': keys.s = false; break;
                case 'KeyD': keys.d = false; break;
            }
        });

        // Мобильные кнопки
        document.getElementById('btn-w').addEventListener('touchstart', () => keys.w = true);
        document.getElementById('btn-w').addEventListener('touchend', () => keys.w = false);
        document.getElementById('btn-s').addEventListener('touchstart', () => keys.s = true);
        document.getElementById('btn-s').addEventListener('touchend', () => keys.s = false);
        document.getElementById('btn-a').addEventListener('touchstart', () => keys.a = true);
        document.getElementById('btn-a').addEventListener('touchend', () => keys.a = false);
        document.getElementById('btn-d').addEventListener('touchstart', () => keys.d = true);
        document.getElementById('btn-d').addEventListener('touchend', () => keys.d = false);
        document.getElementById('btn-jump').addEventListener('touchstart', () => { if (canJump) { velocity.y = 8; canJump = false; } });
        
        // Смена оружия
        document.getElementById('weap1').addEventListener('click', () => setWeapon(0));
        document.getElementById('weap2').addEventListener('click', () => setWeapon(1));
        document.getElementById('weap3').addEventListener('click', () => setWeapon(2));
        
        function setWeapon(idx) {
            currentWeapon = idx;
            document.querySelectorAll('.weapon-slot').forEach((el, i) => {
                if (i === idx) el.classList.add('active');
                else el.classList.remove('active');
            });
            // Показываем оружие или рацию
            weaponGroup.visible = (idx !== 2);
            radioGroup.visible = (idx === 2);
            if (idx === 2) {
                // Вызов подмоги (рация)
                document.getElementById('chat').innerHTML = '📡 Вызвана подмога, скоро прибудет Blackhawk!';
                setTimeout(() => {
                    // Спавн дополнительного SWAT
                    const newSWAT = createSWAT(camera.position.x + 2, camera.position.z + 2);
                    scene.add(newSWAT);
                    swats.push(newSWAT);
                    document.getElementById('chat').innerHTML = '🚁 Подмога прибыла!';
                }, 3000);
            }
        }

        // Выбор команды (1 - CT, 2 - T)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Digit1') { team = 'CT'; document.getElementById('chat').innerHTML = 'Вы за SPECNAZ (SWAT). Десант с Blackhawk!'; spawnWithBlackhawk(); }
            if (e.code === 'Digit2') { team = 'T'; document.getElementById('chat').innerHTML = 'Вы за ТЕРРОРИСТОВ. Минируйте мост!'; }
        });
        
        function spawnWithBlackhawk() {
            // Эффект десантирования
            camera.position.set(20, 20, -30);
            setTimeout(() => {
                camera.position.set(0, 5, 0);
            }, 2000);
        }

        // Камеры наблюдения (цикл по индексам)
        let camIndex = 0;
        document.getElementById('btn-cam').addEventListener('click', () => {
            camIndex = (camIndex + 1) % (cameras.length + 1);
            if (camIndex === cameras.length) {
                // Вернуться в основную камеру
                camera.position.set(0, 5, 10);
            } else {
                const camPos = cameras[camIndex].pos;
                camera.position.copy(camPos.clone().add(new THREE.Vector3(0, 2, 2)));
            }
        });

        // Стрельба (упрощенно)
        document.getElementById('btn-shoot').addEventListener('click', () => {
            if (currentWeapon === 0) {
                document.getElementById('chat').innerHTML = '🔫 Стрельба!';
                // Проверка попадания в террористов (очень упрощенно)
                // В реальном проекте здесь raycasting
            } else if (currentWeapon === 1 && team === 'T') {
                document.getElementById('chat').innerHTML = '💣 Бомба заложена! Террористы победят через 30с';
                setTimeout(() => { document.getElementById('chat').innerHTML = '💥 Террористы победили!'; }, 30000);
            }
        });

        // Джойстики (заглушки для мобильного управления)
        let lookYaw = 0, lookPitch = 0;
        // В реальном проекте здесь обработка touchmove

        // Анимация
        function animate() {
            requestAnimationFrame(animate);

            // Движение (вид от первого лица)
            const speed = 0.3;
            if (keys.w) camera.translateZ(-speed);
            if (keys.s) camera.translateZ(speed);
            if (keys.a) camera.translateX(-speed);
            if (keys.d) camera.translateX(speed);

            // Гравитация
            velocity.y -= 0.3;
            camera.position.y += velocity.y;
            if (camera.position.y < 2) {
                camera.position.y = 2;
                velocity.y = 0;
                canJump = true;
            }

            // Вращение Blackhawk
            blackhawk.rotation.y += 0.01;
            blackhawk.position.x = 20 + Math.sin(Date.now() * 0.001) * 10;
            blackhawk.position.z = -30 + Math.cos(Date.now() * 0.001) * 10;

            // Обновление текста камер (фейковое)
            document.querySelectorAll('#camera-feed div')[2].innerHTML = '📹 ЛЕС: Террористы замечены';

            renderer.render(scene, camera);
        }
        animate();

        // Адаптация под мобильные
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Блокируем контекстное меню
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
